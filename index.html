<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vamp Selection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font (dark aesthetic) -->
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Unbounded', sans-serif;
    }

    body {
      background-color: #0a0a0a;
      color: #e5e5e5;
    }

    header {
      text-align: center;
      padding: 30px;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 32px;
      letter-spacing: 4px;
      color: #ffffff;
    }

    header p {
      font-size: 12px;
      color: #777;
      margin-top: 8px;
    }

    .container {
      padding: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 30px;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      transition: 0.3s;
      overflow: hidden;
    }

    .card:hover {
      transform: scale(1.03);
      border-color: #555;
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      filter: grayscale(100%) contrast(120%);
    }

    .card-content {
      padding: 20px;
    }

    .card-title {
      font-size: 14px;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .price {
      font-size: 12px;
      color: #999;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #222;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>

<header>
  <h1>VAMP SELECTION</h1>
  <p>Dark Archive Fashion</p>
</header>

<section class="container">

  <!-- Product 1 -->
  <div class="card">
    <img src="https://i.imgur.com/4YQZ4sF.jpg" alt="Rick Owens Geobasket">
    <div class="card-content">
      <div class="card-title">
        RICK OWENS ジオバスケット BLACK MILK
      </div>
      <div class="price">¥ --</div>
    </div>
  </div>

  <!-- Product 2 -->
  <div class="card">
    <img src="https://i.imgur.com/7rlxLzF.jpg" alt="Balenciaga Mule">
    <div class="card-content">
      <div class="card-title">
        BALENCIAGA ブラック ウィメンズ FURRY オープンミュール
      </div>
      <div class="price">¥ --</div>
    </div>
  </div>

</section>

<footer>
  © 2026 Vamp Selection
</footer>

</body>
</html>
