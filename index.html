<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vamp Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
  margin:0;
  background:#050505;
  color:#eee;
  font-family:'Unbounded', sans-serif;
}

/* HEADER */
header {
  text-align:center;
  padding:20px;
  border-bottom:1px solid #222;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px 20px;
  padding:30px 20px;
}

/* CARD */
.card {
  cursor:pointer;
}

.card img {
  width:100%;
  height:230px;
  object-fit:cover;
}

/* MODAL */
#modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  transform:translateY(100%);
  transition:0.5s ease;
  z-index:9999;
}

#modal.active {
  transform:translateY(0);
}

/* CLOSE */
.close {
  position:fixed;
  top:20px;
  right:20px;
  font-size:22px;
}

/* PRODUCT SLIDER */
.product-slider {
  display:flex;
  height:100%;
  transition:transform 0.4s ease;
}

.product {
  min-width:100%;
  overflow:hidden;
}

/* IMAGE GALLERY */
.gallery {
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.gallery img {
  width:100%;
  flex:0 0 100%;
  scroll-snap-align:center;
}

/* DM */
.buy-btn {
  margin:20px;
  padding:15px;
  border:1px solid #fff;
  text-align:center;
}

</style>
</head>

<body>

<header>
  <h1>VAMP SELECTION</h1>
</header>

<section class="container">
  <div class="card" onclick="openModal(0)">
    <img src="IMG_0653.webp">
  </div>

  <div class="card" onclick="openModal(1)">
    <img src="IMG_0663.jpeg">
  </div>
</section>

<!-- MODAL -->
<div id="modal">
  <div class="close" onclick="closeModal()">❌</div>

  <div id="slider" class="product-slider">

    <!-- RICK -->
    <div class="product">
      <div class="gallery">
        <img src="IMG_0653.webp">
        <img src="IMG_0537.jpeg">
      </div>
      <div class="buy-btn" onclick="buyNow('Rick Owens Geobasket Black Milk')">
        DM US ON INSTAGRAM
      </div>
    </div>

    <!-- BALENCIAGA -->
    <div class="product">
      <div class="gallery">
        <img src="IMG_0663.jpeg">
        <img src="IMG_0506.jpeg">
      </div>
      <div class="buy-btn" onclick="buyNow('Balenciaga Furry Mule')">
        DM US ON INSTAGRAM
      </div>
    </div>

  </div>
</div>

<script>

let currentIndex = 0;

/* OPEN */
function openModal(index){
  currentIndex = index;
  document.getElementById("modal").classList.add("active");
  updateSlide();
}

/* CLOSE */
function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

/* SLIDE */
function updateSlide(){
  document.getElementById("slider").style.transform =
    "translateX(-" + currentIndex * 100 + "%)";
}

/* SWIPE */
let startX = 0;
let startY = 0;

document.getElementById("modal").addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

document.getElementById("modal").addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;
  let endY = e.changedTouches[0].clientY;

  let diffX = startX - endX;
  let diffY = startY - endY;

  // LEFT / RIGHT
  if(Math.abs(diffX) > 50){
    if(diffX > 0 && currentIndex < 1){
      currentIndex++;
    } else if(diffX < 0 && currentIndex > 0){
      currentIndex--;
    }
    updateSlide();
  }

  // DOWN CLOSE
  if(diffY < -80){
    closeModal();
  }
});

/* DM */
function buyNow(product){
  let msg = "I want to buy: " + product;
  navigator.clipboard.writeText(msg);
  window.open("https://www.instagram.com/daggerdick_77/","_blank");
}

</script>

</body>
</html>
