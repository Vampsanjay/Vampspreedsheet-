<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vamp Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* =========================
   🌲 GLOBAL / BACKGROUND
========================= */

body {
  margin:0;
  padding:0;
  font-family:'Unbounded', sans-serif;
  color:#eaeaea;

  background:
  linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
  url('https://images.unsplash.com/photo-1470770903676-69b98201ea1c?grayscale')
  no-repeat center center fixed;

  background-size:cover;
}

body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://grainy-gradients.vercel.app/noise.svg');
  opacity:0.08;
  pointer-events:none;
}

/* =========================
   🩸 LOADER
========================= */

#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.blood{
  color:#8b0000;
  font-size:26px;
  letter-spacing:10px;
  animation:pulse 1.6s infinite;
  text-shadow:0 0 8px #8b0000, 0 0 20px #4b0000;
}

@keyframes pulse{
  0%,100%{opacity:0.4;}
  50%{opacity:1;}
}

#loader.hide{
  opacity:0;
  transition:1.2s ease;
  pointer-events:none;
}

/* =========================
   ☰ MENU BUTTON
========================= */

.menu-btn{
  position:absolute;
  left:20px;
  top:30px;
  font-size:20px;
  cursor:pointer;
}

/* =========================
   📂 SIDE MENU
========================= */

.side-menu{
  position:fixed;
  top:0;
  left:-100%;
  width:260px;
  height:100%;
  background:#0a0a0a;
  padding:40px 20px;
  transition:0.5s;
  z-index:4000;
}

.side-menu.active{
  left:0;
}

.side-menu a{
  display:block;
  margin:20px 0;
  text-decoration:none;
  color:#aaa;
  font-size:14px;
}

.side-menu a:hover{
  color:#fff;
}

/* =========================
   🧠 HEADER
========================= */

header{
  text-align:center;
  padding:30px 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  position:relative;
}

/* 🩸 AGGRESSIVE TITLE */
header h1{
  font-size:20px;
  letter-spacing:6px;
  color:#b30000;
  text-shadow:
    0 0 5px #ff0000,
    0 0 15px #8b0000,
    0 0 30px #4b0000;
}

/* =========================
   🧱 GRID
========================= */

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px 25px;
  padding:50px 20px;
}

/* CARD */
.card{ cursor:pointer; }
.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.name{ margin-top:14px; font-size:13px; }
.price{ font-size:12px; color:#777; }
.stock{ font-size:11px; color:#b30000; }

/* MODAL */
#modal{
  position:fixed;
  bottom:-100%;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.97);
  transition:0.6s;
  z-index:2000;
  padding-top:70px;
  pointer-events:none;
}

#modal.active{
  bottom:0;
  pointer-events:auto;
}

/* CLOSE */
.close{
  position:fixed;
  top:70px;
  right:20px;
  font-size:24px;
  cursor:pointer;
  z-index:3000;
}

/* GALLERY */
.gallery{ overflow:hidden; position:relative; }
.gallery-track{ display:flex; transition:0.6s; }
.gallery img{
  width:100%;
  flex:0 0 100%;
  opacity:0.6;
  filter:blur(6px);
}
.gallery img.active{
  opacity:1;
  filter:blur(0);
}

/* ARROWS */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  padding:8px;
  cursor:pointer;
}
.arrow.left{ left:10px; }
.arrow.right{ right:10px; }

/* DOTS */
.dots{text-align:center;}
.dot{
  width:6px;
  height:6px;
  background:#444;
  display:inline-block;
  margin:5px;
  border-radius:50%;
}
.dot.active{
  width:16px;
  background:#fff;
}

/* DM */
#dmPreview{ margin:20px; font-size:12px; color:#aaa; }
.buy-btn{
  margin:20px;
  padding:15px;
  border:1px solid #fff;
  text-align:center;
  cursor:pointer;
}

/* INSTAGRAM */
.insta{
  margin:80px 0;
  text-align:center;
  font-size:12px;
}

</style>
</head>

<body>

<!-- MENU -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="side-menu" id="menu">
  <a href="#">Home</a>
  <a href="#">Archive</a>
  <a href="#">Contact</a>
</div>

<!-- LOADER -->
<div id="loader">
  <div class="blood">VAMP SELECTION</div>
</div>

<header>
  <h1>VAMP SELECTION</h1>
</header>

<section class="container">

<div class="card" onclick="openModal('rick')">
  <img src="IMG_0653.webp">
  <div class="name">Rick Owens<br>Geobasket Black Milk</div>
  <div class="price">¥120,000</div>
  <div class="stock">Only 1 left</div>
</div>

<div class="card" onclick="openModal('balenciaga')">
  <img src="IMG_0663.jpeg">
  <div class="name">Balenciaga<br>Furry Mule</div>
  <div class="price">¥95,000</div>
</div>

</section>

<div class="insta">
  FOLLOW FOR MORE<br>
  <a href="https://www.instagram.com/daggerdick_77/" target="_blank">Instagram</a>
</div>

<div id="modal">
  <div class="close" onclick="closeModal()">❌</div>
  <div id="modalContent"></div>
  <div id="dmPreview"></div>
  <div class="buy-btn" onclick="buyNow()">DM US ON INSTAGRAM</div>
</div>

<script>

/* MENU */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

/* LOADER */
window.onload=()=>{
  setTimeout(()=>loader.classList.add("hide"),1200);
};

let currentProduct="";
let currentIndex=0;
let totalImages=0;

function openModal(product){

  if(product==="rick"){
    currentProduct="Rick Owens Geobasket";
    totalImages=2;
    modalContent.innerHTML=createGallery([
      "IMG_0653.webp",
      "IMG_0537.jpeg"
    ]);
  }

  if(product==="balenciaga"){
    currentProduct="Balenciaga Mule";
    totalImages=2;
    modalContent.innerHTML=createGallery([
      "IMG_0663.jpeg",
      "IMG_0506.jpeg"
    ]);
  }

  currentIndex=0;
  setTimeout(updateGallery,50);

  dmPreview.innerText="I want to buy: "+currentProduct;
  modal.classList.add("active");
}

function createGallery(images){
  return `
    <div class="gallery">
      <div class="gallery-track" id="track">
        ${images.map(img=>`<img src="${img}">`).join("")}
      </div>
      <div class="arrow left" onclick="prev()">←</div>
      <div class="arrow right" onclick="next()">→</div>
    </div>
    <div class="dots">
      ${images.map((_,i)=>`<span class="dot" id="dot${i}"></span>`).join("")}
    </div>
  `;
}

function updateGallery(){
  const track=document.getElementById("track");
  const images=document.querySelectorAll("#track img");

  track.style.transform="translateX(-"+(currentIndex*100)+"%)";

  images.forEach((img,i)=>{
    img.classList.toggle("active",i===currentIndex);
  });

  for(let i=0;i<totalImages;i++){
    document.getElementById("dot"+i).classList.remove("active");
  }
  document.getElementById("dot"+currentIndex).classList.add("active");
}

function next(){
  if(currentIndex<totalImages-1){
    currentIndex++;
    updateGallery();
  }
}

function prev(){
  if(currentIndex>0){
    currentIndex--;
    updateGallery();
  }
}

function closeModal(){
  modal.classList.remove("active");
}

function buyNow(){
  navigator.clipboard.writeText("I want to buy: "+currentProduct);
  window.open("https://www.instagram.com/daggerdick_77/");
}

</script>

</body>
</html>
