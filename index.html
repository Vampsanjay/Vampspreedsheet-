<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vamp Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#050505;
  color:#eee;
  font-family:'Unbounded', sans-serif;
  cursor:none;
}

/* CUSTOM CURSOR */
.cursor {
  position:fixed;
  width:12px;
  height:12px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%, -50%);
  mix-blend-mode:difference;
}

/* HEADER */
header {
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  border-bottom:1px solid #222;
  position:relative;
  backdrop-filter: blur(6px);
}

.menu-btn {
  position:absolute;
  left:20px;
  font-size:22px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:rgba(0,0,0,0.9);
  backdrop-filter: blur(10px);
  transition:0.4s;
  padding:30px 20px;
}

.sidebar a {
  display:block;
  margin:20px 0;
  color:#777;
}

.sidebar a:hover {
  color:#fff;
}

/* OVERLAY */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
  padding:30px;
}

/* CARD */
.card {
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 0.6s forwards;
  background:#0d0d0d;
  border:1px solid #222;
  cursor:pointer;
}

@keyframes fadeUp {
  to {opacity:1; transform:translateY(0);}
}

.card img {
  width:100%;
  height:300px;
  object-fit:cover;
  filter:grayscale(100%);
  transition:0.3s;
}

.card:hover img {
  filter:grayscale(0%);
  transform:scale(1.05);
}

.card-content {
  padding:15px;
}

.price {
  color:#888;
  font-size:12px;
}

/* VIEWERS */
.viewers {
  font-size:11px;
  color:#aaa;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  overflow:auto;
}

.gallery {
  display:flex;
  overflow-x:scroll;
}

.gallery img {
  width:100%;
  flex-shrink:0;
}

/* BUY */
.buy-btn {
  margin:20px;
  padding:15px;
  border:1px solid #fff;
  text-align:center;
}

/* DM */
.dm-box {
  margin:20px;
  border:1px solid #333;
  padding:10px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<!-- MENU -->
<div id="sidebar" class="sidebar">
  <a onclick="filter('all'); closeMenu()">ALL</a>
  <a onclick="filter('shoes'); closeMenu()">SHOES</a>
  <a onclick="filter('new'); closeMenu()">NEW</a>
</div>

<div id="overlay" class="overlay" onclick="closeMenu()"></div>

<header>
  <div class="menu-btn" onclick="openMenu()">☰</div>
  <h1>VAMP SELECTION</h1>
</header>

<section class="container">

<div class="card" data-type="shoes new" onclick="openModal('rick')">
  <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk.png">
  <div class="card-content">
    RICK OWENS GEOBASKET
    <div class="price">¥120,000</div>
    <div class="viewers" id="viewers"></div>
    <div style="color:red;font-size:11px;">Only 1 left</div>
  </div>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div onclick="closeModal()" style="position:fixed;top:20px;right:20px;">✕</div>

  <div id="modalContent"></div>

  <div id="dmPreview" class="dm-box"></div>

  <div class="buy-btn" onclick="buyNow()">SEND DM</div>
</div>

<script>
let currentProduct = "";

/* CURSOR */
document.addEventListener("mousemove", e=>{
  document.getElementById("cursor").style.left = e.clientX+"px";
  document.getElementById("cursor").style.top = e.clientY+"px";
});

/* VIEWERS */
document.getElementById("viewers").innerText =
  Math.floor(Math.random()*20)+5 + " viewing";

/* MENU */
function openMenu(){
  sidebar.style.left="0";
  overlay.style.display="block";
}
function closeMenu(){
  sidebar.style.left="-260px";
  overlay.style.display="none";
}

/* FILTER */
function filter(type){
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=(type==="all"||c.dataset.type.includes(type))?"block":"none";
  });
}

/* MODAL */
function openModal(){
  currentProduct="RICK OWENS GEOBASKET";

  modalContent.innerHTML=`
  <div class="gallery">
    <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk.png">
    <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk-Product.jpg">
  </div>`;

  dmPreview.innerText="Message:\nI want to buy: "+currentProduct;

  modal.style.display="block";
}

function closeModal(){
  modal.style.display="none";
}

/* BUY */
function buyNow(){
  let msg="I want to buy: "+currentProduct;
  navigator.clipboard.writeText(msg);
  window.open("https://www.instagram.com/daggerdick_77/","_blank");
}
</script>

</body>
</html>
