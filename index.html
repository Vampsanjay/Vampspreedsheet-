<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vamp Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#050505;
  color:#eee;
  font-family:'Unbounded', sans-serif;
}

/* HEADER */
header {
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  border-bottom:1px solid #222;
  position:relative;
}

.menu-btn {
  position:absolute;
  left:20px;
  font-size:20px;
  cursor:pointer;
}

h1 {
  font-size:16px;
  letter-spacing:4px;
}

/* GRID LIKE ARCHIVED */
.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px 20px;
  padding:30px 20px;
}

/* PRODUCT */
.card {
  cursor:pointer;
  transition:0.3s;
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
  background:#111;
  transition:0.4s;
}

.card:hover img {
  opacity:0.85;
}

/* TEXT */
.name {
  margin-top:10px;
  font-size:13px;
  line-height:1.4;
}

.price {
  margin-top:5px;
  font-size:12px;
  color:#777;
}

.stock {
  color:red;
  font-size:11px;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  z-index:2000;
}

.gallery img {
  width:100%;
}

.close {
  position:fixed;
  top:20px;
  right:20px;
  font-size:20px;
  cursor:pointer;
}

/* DM */
#dmPreview {
  margin:20px;
  font-size:12px;
  color:#aaa;
}

.buy-btn {
  margin:20px;
  padding:15px;
  border:1px solid #fff;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="menu-btn">☰</div>
  <h1>VAMP SELECTION</h1>
</header>

<section class="container">

<!-- RICK -->
<div class="card" onclick="openModal('rick')">
  <img src="IMG_0653.webp">
  <div class="name">
    Rick Owens<br>Geobasket Black Milk
  </div>
  <div class="price">¥120,000</div>
  <div class="stock">Only 1 left</div>
</div>

<!-- BALENCIAGA -->
<div class="card" onclick="openModal('balenciaga')">
  <img src="IMG_0663.jpeg">
  <div class="name">
    Balenciaga<br>Furry Mule
  </div>
  <div class="price">¥95,000</div>
</div>

</section>

<!-- MODAL -->
<div id="modal">
  <div class="close" onclick="closeModal()">✕</div>

  <div id="modalContent"></div>

  <div id="dmPreview"></div>

  <div class="buy-btn" onclick="buyNow()">DM TO BUY</div>
</div>

<script>
let currentProduct = "";

/* MODAL */
function openModal(product){

  if(product==="rick"){
    currentProduct="Rick Owens Geobasket Black Milk";
    document.getElementById("modalContent").innerHTML=
      `<div class="gallery">
        <img src="IMG_0653.webp">
      </div>`;
  }

  if(product==="balenciaga"){
    currentProduct="Balenciaga Furry Mule";
    document.getElementById("modalContent").innerHTML=
      `<div class="gallery">
        <img src="IMG_0663.jpeg">
      </div>`;
  }

  document.getElementById("dmPreview").innerText =
    "Message:\nI want to buy: " + currentProduct;

  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* BUY */
function buyNow(){
  let msg="I want to buy: "+currentProduct;
  navigator.clipboard.writeText(msg);
  window.open("https://www.instagram.com/daggerdick_77/","_blank");
}
</script>

</body>
</html>
