<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VampSpreadsheet — Shoe Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a2e; --accent: #00d4ff; --text: #ffffff; --muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        header { position: sticky; top: 0; background: rgba(15,15,15,0.8); backdrop-filter: blur(10px); padding: 1rem 5%; border-bottom: 1px solid #333; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.4rem; font-weight: 700; color: var(--text); }
        .search-box { background: #252538; border: 1px solid #444; padding: 0.5rem 1rem; border-radius: 8px; color: white; width: 200px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 10px; border: 1px solid transparent; transition: 0.3s; text-align: center; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; margin-bottom: 8px; background: #111; }
        .card h3 { font-size: 0.85rem; font-weight: 500; height: 35px; overflow: hidden; margin-bottom: 5px; color: var(--text); }
        .price { color: var(--accent); font-weight: 700; font-size: 1rem; }
        footer { text-align: center; padding: 40px; color: var(--muted); font-size: 0.8rem; }
    </style>
</head>
<body>

        document.getElementById('search').addEventListener('input', (e) => {
