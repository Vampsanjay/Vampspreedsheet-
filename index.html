<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vamp Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#050505;
  color:#eee;
  font-family:'Unbounded', sans-serif;
}

/* HEADER */
header {
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  border-bottom:1px solid #222;
  position:relative;
}

h1 {
  letter-spacing:5px;
  font-size:18px;
}

/* MENU BUTTON */
.menu-btn {
  position:absolute;
  left:20px;
  font-size:22px;
  cursor:pointer;
}

/* SIDEBAR (SMOOTH) */
.sidebar {
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#000;
  border-right:1px solid #222;
  transition:0.4s ease;
  padding:30px 20px;
  z-index:1000;
}

.sidebar a {
  display:block;
  margin:20px 0;
  color:#777;
  text-decoration:none;
  font-size:14px;
  letter-spacing:1px;
}

.sidebar a:hover {
  color:#fff;
}

/* OVERLAY */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
  padding:30px;
}

.card {
  background:#0d0d0d;
  border:1px solid #222;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
}

.card img {
  width:100%;
  height:300px;
  object-fit:cover;
  filter:grayscale(100%);
}

.card-content {
  padding:15px;
}

.price {
  color:#888;
  font-size:12px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  overflow:auto;
  z-index:2000;
}

.modal img {
  width:100%;
  margin-bottom:20px;
}

.close {
  position:fixed;
  top:20px;
  right:20px;
  font-size:20px;
  cursor:pointer;
}

/* DM BOX */
.dm-box {
  margin:20px;
  padding:10px;
  border:1px solid #333;
  font-size:12px;
  color:#aaa;
}

/* BUY */
.buy-btn {
  margin:20px;
  padding:15px;
  border:1px solid #fff;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="sidebar" class="sidebar">
  <a onclick="filter('all'); closeMenu()">ALL ITEMS</a>
  <a onclick="filter('shoes'); closeMenu()">SHOES</a>
  <a onclick="filter('new'); closeMenu()">NEW DROPS</a>
</div>

<div id="overlay" class="overlay" onclick="closeMenu()"></div>

<header>
  <div class="menu-btn" onclick="openMenu()">☰</div>
  <h1>VAMP SELECTION</h1>
</header>

<!-- PRODUCTS -->
<section class="container">

<div class="card" data-type="shoes new" onclick="openModal('rick')">
  <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk.png">
  <div class="card-content">
    RICK OWENS GEOBASKET
    <div class="price">¥120,000</div>
  </div>
</div>

<div class="card" data-type="shoes">
  <img src="https://balenciaga.dam.kering.com/m/2d3e9f1f6e0f7a0f/Medium-677390W2F701000_F.jpg">
  <div class="card-content">
    BALENCIAGA FURRY MULE
    <div class="price">¥95,000</div>
  </div>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="close" onclick="closeModal()">✕</div>
  <div id="modalContent"></div>

  <div id="dmPreview" class="dm-box"></div>

  <div class="buy-btn" onclick="buyNow()">SEND DM</div>
</div>

<script>
let currentProduct = "";

/* MENU */
function openMenu() {
  document.getElementById("sidebar").style.left = "0";
  document.getElementById("overlay").style.display = "block";
}

function closeMenu() {
  document.getElementById("sidebar").style.left = "-260px";
  document.getElementById("overlay").style.display = "none";
}

/* FILTER */
function filter(type) {
  document.querySelectorAll(".card").forEach(card => {
    let types = card.dataset.type;
    card.style.display =
      (type === "all" || types.includes(type)) ? "block" : "none";
  });
}

/* MODAL */
function openModal(product) {
  const content = document.getElementById("modalContent");
  const preview = document.getElementById("dmPreview");

  if(product === 'rick') {
    currentProduct = "RICK OWENS GEOBASKET BLACK MILK";
    content.innerHTML = `
      <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk.png">
    `;
  }

  preview.innerText = "Message:\nI want to buy: " + currentProduct;

  document.getElementById("modal").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* BUY */
function buyNow() {
  let msg = "I want to buy: " + currentProduct;
  navigator.clipboard.writeText(msg).then(() => {
    window.open("https://www.instagram.com/daggerdick_77/", "_blank");
  });
}
</script>

</body>
</html>
