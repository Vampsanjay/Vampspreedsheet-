<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VampSpreadsheet — Browse Rep Shoes</title>
    <meta name="description" content="VampSpreadsheet — Browse rep shoes with names and prices">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0f0f0f;
            --bg-card: #1a1a2e;
            --accent: #00d4ff;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --header-glass: rgba(15, 15, 15, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Header & Nav --- */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--header-glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #333;
            padding: 1rem 5%;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        .search-box {
            background: #252538;
            border: 1px solid #444;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            color: white;
            width: 300px;
            outline: none;
            transition: border 0.3s;
        }

        .search-box:focus { border-color: var(--accent); }

        /* --- Hero --- */
        .hero-banner {
            background: #16213e;
            text-align: center;
            padding: 8px 0;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-bottom: 1px solid #333;
        }

        /* --- Controls --- */
        .controls {
            max-width: 1400px;
            margin: 2rem auto 0;
            padding: 0 5%;
            display: flex;
            justify-content: flex-end;
        }

        select {
            background: #1a1a2e;
            color: white;
            border: 1px solid #444;
            padding: 0.5rem;
            border-radius: 6px;
        }

        /* --- Product Grid --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 5%;
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1rem;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 1rem;
            background: #252538;
        }

        .card h3 {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            height: 2.4em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .price {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.2rem;
        }

        /* --- Responsive --- */
        @media (max-width: 1024px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { 
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; } 
            .search-box { width: 150px; }
            .logo { font-size: 1.2rem; }
        }

        footer {
            text-align: center;
            padding: 4rem 0 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">VampSpreadsheet</div>
            <input type="text" id="searchInput" class="search-box" placeholder="Search shoes...">
        </div>
    </header>

    <div class="hero-banner">
        Browse the latest rep shoes — updated regularly
    </div>

    <div class="controls">
        <select id="sortSelect">
            <option value="default">Default Sort</option>
            <option value="low">Price: Low to High</option>
            <option value="high">Price: High to Low</option>
        </select>
    </div>

    <main class="product-grid" id="grid"></main>

    <footer>
        <p>VampSpreadsheet &copy; 2026</p>
        <p style="margin-top: 10px;">For reference only. No sales conducted on this site.</p>
    </footer>

    <script>
        // Local Data Array (Extracted from Mulebuy)
        const products = [
            { name: "Air Jordan 1 Dark Mocha", price: 43.38, img: "https://img.mulebuy.com/images/1.jpg" },
            { name: "Travis Scott AJ1 Mocha", price: 44.31, img: "https://img.mulebuy.com/images/2.jpg" },
            { name: "Travis Scott AJ1 Fragment", price: 61.34, img: "https://img.mulebuy.com/images/3.jpg" },
            { name: "Jordan 1 Low Reverse Mocha", price: 53.68, img: "https://img.mulebuy.com/images/4.jpg" },
            { name: "Travis Scott Jordan 1 Low Olive", price: 35.12, img: "https://img.mulebuy.com/images/5.jpg" },
            { name: "Travis Scott Jordan 1 Low Fragment", price: 53.68, img: "https://img.mulebuy.com/images/6.jpg" },
            { name: "Travis Scott 1 Low Phantom", price: 27.60, img: "https://img.mulebuy.com/images/7.jpg" },
            { name: "Travis Scott PlayStation Dunk", price: 60.58, img: "https://img.mulebuy.com/images/8.jpg" },
            { name: "Travis Scott x Jordan Jumpman Jack", price: 47.08, img: "https://img.mulebuy.com/images/9.jpg" },
            { name: "Dunk Low Travis Scott", price: 44.31, img: "https://img.mulebuy.com/images/10.jpg" },
            { name: "Air Jordan 1 Chicago Lost and Found", price: 38.34, img: "https://img.mulebuy.com/images/11.jpg" },
            { name: "AJ1 Retro High Turbo Green", price: 38.34, img: "https://img.mulebuy.com/images/12.jpg" },
            { name: "Jordan 1 Retro High Obsidian UNC", price: 38.34, img: "https://img.mulebuy.com/images/13.jpg" },
            { name: "Jordan 1 Retro High Tie Dye", price: 38.34, img: "https://img.mulebuy.com/images/14.jpg" },
            { name: "Jordan 1 Retro High Shadow 2.0", price: 38.34, img: "https://img.mulebuy.com/images/15.jpg" }
        ];

        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');

        function renderProducts(data) {
            grid.innerHTML = data.map(p => `
                <div class="card">
                    <img src="${p.img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                    <h3>${p.name}</h3>
                    <div class="price">$${p.price.toFixed(2)}</div>
                </div>
            `).join('');
        }

        // Search Logic
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        });

        // Sort Logic
        sortSelect.addEventListener('change', (e) => {
            let sorted = [...products];
            if (e.target.value === 'low') sorted.sort((a,b) => a.price - b.price);
            if (e.target.value === 'high') sorted.sort((a,b) => b.price - a.price);
            renderProducts(sorted);
        });

        // Initial Load
        renderProducts(products);
    </script>
</body>
</html>
