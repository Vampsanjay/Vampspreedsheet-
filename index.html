<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAMP LOOKBOOK</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #00f2ff;
            --text: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif;
            /* This enables the "Snap" effect */
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100vh;
        }

        /* Full Screen Section */
        section {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Text at bottom */
            align-items: center;
            scroll-snap-align: start;
            position: relative;
            padding-bottom: 80px;
            border-bottom: 1px solid #111;
        }

        /* Big Product Image */
        .product-img {
            position: absolute;
            top: 10%;
            width: 90%;
            height: 60%;
            object-fit: contain;
            z-index: 1;
        }

        /* Product Info Overlay */
        .info {
            z-index: 2;
            text-align: center;
            width: 90%;
            background: linear-gradient(to top, rgba(0,0,0,1), transparent);
            padding: 20px;
        }

        .name {
            font-family: 'Syncopate', sans-serif;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .price {
            font-family: 'Syncopate', sans-serif;
            color: var(--accent);
            font-size: 1.4rem;
            font-weight: 700;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px;
            text-align: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 5px;
            opacity: 0.7;
        }

        /* Hide scrollbar but keep functionality */
        body::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">VAMP // SELECTION</div>
    </header>

    <div id="content"></div>

    <script>
        const products = [
            { n: "Rick Owens Geobasket Black Milk", p: 115.42, i: "https://www.sivasdescalzo.com/media/catalog/product/r/u/ru02c7894-lpo-911_svd-rick-owens-geobasket-1691494793-1.jpg?quality=80&fit=bounds&width=1200" },
            { n: "AJ1 Retro High Dark Mocha", p: 43.38, i: "https://images.stockx.com/images/Air-Jordan-1-Retro-High-Dark-Mocha-Product.jpg?fit=fill&bg=FFFFFF&w=1200&h=1000&fm=webp" },
            { n: "TS x AJ1 High Mocha", p: 44.31, i: "https://images.stockx.com/images/Air-Jordan-1-Retro-High-Travis-Scott-Product.jpg?fit=fill&bg=FFFFFF&w=1200&h=1000&fm=webp" },
            { n: "TS x Fragment AJ1 High", p: 61.34, i: "https://images.stockx.com/images/Air-Jordan-1-Retro-High-OG-SP-Fragment-Design-x-Travis-Scott-Product.jpg?fit=fill&bg=FFFFFF&w=1200&h=1000&fm=webp" },
            { n: "TS x AJ1 Low Reverse Mocha", p: 53.68, i: "https://images.stockx.com/images/Air-Jordan-1-Retro-Low-OG-SP-Travis-Scott-Reverse-Mocha-Product.jpg?fit=fill&bg=FFFFFF&w=1200&h=1000&fm=webp" },
            { n: "AJ4 Retro Military Blue", p: 65.30, i: "https://images.stockx.com/images/Air-Jordan-4-Retro-Military-Blue-2024-Product.jpg?fit=fill&bg=FFFFFF&w=1200&h=1000&fm=webp" }
        ];

        const container = document.getElementById('content');

        container.innerHTML = products.map(p => `
            <section>
                <img src="${p.i}" class="product-img" alt="${p.n}">
                <div class="info">
                    <h2 class="name">${p.n}</h2>
                    <div class="price">$${p.p.toFixed(2)}</div>
                </div>
            </section>
        `).join('');
    </script>
</body>
</html>
