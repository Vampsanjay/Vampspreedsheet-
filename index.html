<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vamp Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#050505;
  color:#eee;
  font-family:'Unbounded', sans-serif;
  overflow-x:hidden;
}

/* GLITCH TITLE */
h1 {
  text-align:center;
  margin-top:30px;
  letter-spacing:6px;
  animation:flicker 2s infinite;
}

@keyframes flicker {
  0% {opacity:1;}
  50% {opacity:0.6;}
  100% {opacity:1;}
}

/* NAV */
.nav {
  display:flex;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.nav button {
  background:none;
  border:none;
  color:#666;
  cursor:pointer;
}

.nav button:hover {
  color:#fff;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:40px;
  padding:40px;
}

/* CARD */
.card {
  position:relative;
  background:#0d0d0d;
  border:1px solid #222;
  overflow:hidden;
  cursor:pointer;
}

.card img {
  width:100%;
  height:320px;
  object-fit:cover;
  transition:0.4s;
  filter:grayscale(100%);
}

.card:hover img {
  transform:scale(1.1) rotate(1deg);
  filter:grayscale(0%);
}

/* BADGE */
.badge {
  position:absolute;
  top:10px;
  left:10px;
  font-size:10px;
  border:1px solid #fff;
  padding:4px 6px;
}

/* VIEWERS */
.viewers {
  position:absolute;
  bottom:10px;
  right:10px;
  font-size:10px;
  color:#aaa;
}

/* COUNTDOWN */
.countdown {
  text-align:center;
  font-size:14px;
  margin-top:10px;
  color:#aaa;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  overflow:auto;
}

.modal img {
  width:100%;
}

/* BUTTON */
.buy-btn {
  margin:20px;
  padding:15px;
  border:1px solid #fff;
  text-align:center;
  cursor:pointer;
}

/* PASSWORD */
.lock {
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

input {
  padding:10px;
  background:#111;
  border:1px solid #333;
  color:#fff;
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lock" class="lock">
  <h1>PRIVATE DROP</h1>
  <input type="password" id="pass" placeholder="Enter password">
  <button onclick="unlock()">ENTER</button>
</div>

<!-- MAIN -->
<div id="site" style="display:none;">

<h1>VAMP SELECTION</h1>

<div class="countdown" id="countdown"></div>

<div class="nav">
  <button onclick="filter('all')">ALL</button>
  <button onclick="filter('new')">NEW</button>
  <button onclick="filter('sold')">SOLD</button>
</div>

<section class="container">

<div class="card new" data-type="new" onclick="openModal('rick')">
  <div class="badge">NEW</div>
  <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk.png">
  <div class="viewers">12 viewing</div>
</div>

<div class="card sold" data-type="sold">
  <div class="badge" style="border-color:red;color:red;">SOLD OUT</div>
  <img src="https://balenciaga.dam.kering.com/m/2d3e9f1f6e0f7a0f/Medium-677390W2F701000_F.jpg">
</div>

</section>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div onclick="closeModal()" style="position:fixed;top:20px;right:20px;">✕</div>
  <div id="modalContent"></div>
  <div class="buy-btn" onclick="buyNow()">SEND DM</div>
</div>

<script>
let currentProduct = "";

/* PASSWORD */
function unlock() {
  let pass = document.getElementById("pass").value;
  if(pass === "vamp") {
    document.getElementById("lock").style.display = "none";
    document.getElementById("site").style.display = "block";
  } else {
    alert("Wrong password");
  }
}

/* COUNTDOWN */
let dropDate = new Date().getTime() + 86400000;

setInterval(() => {
  let now = new Date().getTime();
  let diff = dropDate - now;

  let h = Math.floor(diff / (1000*60*60));
  let m = Math.floor((diff % (1000*60*60)) / (1000*60));
  let s = Math.floor((diff % (1000*60)) / 1000);

  document.getElementById("countdown").innerText =
    "NEXT DROP IN: " + h + "h " + m + "m " + s + "s";
}, 1000);

/* FILTER */
function filter(type) {
  document.querySelectorAll(".card").forEach(card => {
    card.style.display =
      (type === "all" || card.dataset.type === type) ? "block" : "none";
  });
}

/* MODAL */
function openModal(product) {
  currentProduct = "RICK OWENS GEOBASKET";
  document.getElementById("modalContent").innerHTML =
    `<img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk.png">`;

  document.getElementById("modal").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* BUY */
function buyNow() {
  let msg = "I want to buy: " + currentProduct;
  navigator.clipboard.writeText(msg);
  window.open("https://www.instagram.com/daggerdick_77/", "_blank");
}
</script>

</body>
</html>
