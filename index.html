<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VampSpreadsheet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a2e; --accent: #00d4ff; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        header { position: sticky; top: 0; background: rgba(15,15,15,0.9); backdrop-filter: blur(10px); padding: 15px 5%; border-bottom: 1px solid #333; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 10px; border: 1px solid #333; text-align: center; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
        .price { color: var(--accent); font-weight: 700; }
    </style>
</head>
<body>
    <header><div class="logo">VampSpreadsheet</div></header>
    <main class="grid" id="grid"></main>

    <script>
        const products = [
            { n: "AJ1 Dark Mocha", p: 43.38, i: "https://i.imgur.com/uRk0T8t.jpeg" },
            { n: "TS AJ1 Mocha", p: 44.31, i: "https://i.imgur.com/8N69V6G.jpeg" },
            { n: "AJ1 Retro High Shadow", p: 38.34, i: "https://i.imgur.com/R3Z5Lz6.jpeg" },
            { n: "TS Low Reverse Mocha", p: 53.68, i: "https://i.imgur.com/mE8G4h7.jpeg" }
        ];

        document.getElementById('grid').innerHTML = products.map(p => `
            <div class="card">
                <img src="${p.i}">
                <h3>${p.n}</h3>
                <div class="price">$${p.p.toFixed(2)}</div>
            </div>
        `).join('');
    </script>
</body>
</html>
