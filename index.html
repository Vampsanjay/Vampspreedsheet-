<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VampSpreadsheet — Shoe Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a2e; --accent: #00d4ff; --text: #ffffff; --muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        header { position: sticky; top: 0; background: rgba(15,15,15,0.9); backdrop-filter: blur(10px); padding: 1rem 5%; border-bottom: 1px solid #333; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; }
        .search-box { background: #252538; border: 1px solid #444; padding: 0.6rem 1rem; border-radius: 8px; color: white; width: 160px; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: var(--accent); width: 200px; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 10px; border: 1px solid #333; text-align: center; transition: 0.3s; }
        .card:active { transform: scale(0.98); border-color: var(--accent); }
        
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; margin-bottom: 8px; background: #111; display: block; }
        .card h3 { font-size: 0.8rem; font-weight: 500; height: 38px; overflow: hidden; margin-bottom: 4px; line-height: 1.2; color: #eee; }
        .price { color: var(--accent); font-weight: 700; font-size: 1rem; }
        
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } .search-box { width: 300px; } }
        footer { text-align: center; padding: 40px; color: var(--muted); font-size: 0.75rem; border-top: 1px solid #222; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">VampSpreadsheet</div>
        <input type="text" id="search" class="search-box" placeholder="Search shoes...">
    </header>

    <main class="grid" id="grid"></main>

    <footer>
        VampSpreadsheet &copy; 2026<br>
        For educational reference only.
    </footer>

    <script>
        // Data from the provided spreadsheet
        // Images are routed through a worker to ensure they load on mobile
        const products = [
                  const products = [
            { 
                n: "Rick Owens Geobasket 'Black/Milk'", 
                p: 115.42, 
                i: "https://www.sivasdescalzo.com/media/catalog/product/r/u/ru02c7894-lpo-911_svd-rick-owens-geobasket-1691494793-1.jpg?quality=80&fit=bounds&width=1600" 
            },
            { 
                n: "AJ1 Dark Mocha", 
                p: 43.38, 
                i: "https://images.stockx.com/images/Air-Jordan-1-Retro-High-Dark-Mocha-Product.jpg?fit=fill&bg=FFFFFF&w=700&h=500&fm=webp&auto=compress&q=90&dpr=2&updated_at=1606325289" 
            }
        ];


        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('search');

        const render = (items) => {
            grid.innerHTML = items.map(p => `
                <div class="card">
                    <img src="${p.i}" loading="lazy" onerror="this.src='https://via.placeholder.com/300/1a1a2e/ffffff?text=Image+Loading...'">
                    <h3>${p.n}</h3>
                    <div class="price">$${p.p.toFixed(2)}</div>
                </div>
            `).join('');
        };

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = products.filter(p => p.n.toLowerCase().includes(term));
            render(filtered);
        });

        // Initial Load
        render(products);
    </script>
</body>
</html>
