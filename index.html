<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vamp Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#050505;
  color:#eee;
  font-family:'Unbounded', sans-serif;
}

/* HEADER */
header {
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  border-bottom:1px solid #222;
  position:relative;
}

h1 {
  letter-spacing:5px;
  font-size:20px;
}

/* HAMBURGER */
.menu-btn {
  position:absolute;
  left:20px;
  font-size:20px;
  cursor:pointer;
}

/* SIDE MENU */
.sidebar {
  position:fixed;
  top:0;
  left:-250px;
  width:250px;
  height:100%;
  background:#000;
  border-right:1px solid #222;
  transition:0.3s;
  padding:20px;
}

.sidebar a {
  display:block;
  margin:20px 0;
  color:#aaa;
  text-decoration:none;
  font-size:14px;
}

.sidebar a:hover {
  color:#fff;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
  padding:30px;
}

/* CARD */
.card {
  background:#0d0d0d;
  border:1px solid #222;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
}

.card img {
  width:100%;
  height:300px;
  object-fit:cover;
  filter:grayscale(100%);
}

.card-content {
  padding:15px;
}

.price {
  color:#888;
  font-size:12px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  overflow:auto;
}

.modal img {
  width:100%;
}

.close {
  position:fixed;
  top:20px;
  right:20px;
  cursor:pointer;
}

/* BUY */
.buy-btn {
  margin:20px;
  padding:15px;
  border:1px solid #fff;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="sidebar" id="sidebar">
  <a href="#" onclick="filter('all')">ALL ITEMS</a>
  <a href="#" onclick="filter('shoes')">SHOES</a>
  <a href="#" onclick="filter('clothes')">CLOTHES</a>
  <a href="#" onclick="filter('accessories')">ACCESSORIES</a>
  <a href="#" onclick="filter('new')">NEW DROPS</a>
</div>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <h1>VAMP SELECTION</h1>
</header>

<!-- PRODUCTS -->
<section class="container">

<div class="card" data-type="shoes" onclick="openModal('rick')">
  <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk.png">
  <div class="card-content">
    RICK OWENS GEOBASKET
    <div class="price">¥120,000</div>
  </div>
</div>

<div class="card" data-type="shoes">
  <img src="https://balenciaga.dam.kering.com/m/2d3e9f1f6e0f7a0f/Medium-677390W2F701000_F.jpg">
  <div class="card-content">
    BALENCIAGA FURRY MULE
    <div class="price">¥95,000</div>
  </div>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="close" onclick="closeModal()">✕</div>
  <div id="modalContent"></div>
  <div class="buy-btn" onclick="buyNow()">SEND DM</div>
</div>

<script>
let currentProduct = "";

/* MENU */
function toggleMenu() {
  let menu = document.getElementById("sidebar");
  menu.style.left = (menu.style.left === "0px") ? "-250px" : "0px";
}

/* FILTER */
function filter(type) {
  document.querySelectorAll(".card").forEach(card => {
    card.style.display =
      (type === "all" || card.dataset.type === type) ? "block" : "none";
  });
}

/* MODAL */
function openModal(product) {
  currentProduct = "RICK OWENS GEOBASKET";

  document.getElementById("modalContent").innerHTML =
    `<img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk.png">`;

  document.getElementById("modal").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* BUY */
function buyNow() {
  let msg = "I want to buy: " + currentProduct;
  navigator.clipboard.writeText(msg);
  window.open("https://www.instagram.com/daggerdick_77/", "_blank");
}
</script>

</body>
</html>
