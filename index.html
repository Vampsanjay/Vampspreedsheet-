<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VAMP COLLECTION</title>

<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Unbounded:wght@300;400;500&display=swap" rel="stylesheet">

<style>
   /* Extend page length but keep product in same place */
body {
  min-height: 200vh; /* Makes the page roughly twice the viewport height */
  position: relative;
}

.container {
  position: relative; /* keeps product cards in same visual place */
  z-index: 1;
}

.insta,
.footer-warning {
  position: absolute;
  left: 0;
  width: 100%;
  text-align: center;
  z-index: 1;
}

.insta {
  bottom: 80px; /* Instagram link floats near bottom */
}

.footer-warning {
  bottom: 30px; /* Caution text stays just above the bottom */
}

/* =========================
   🌲 BACKGROUND
========================= */
body {
  margin: 0;
  font-family: 'Unbounded', sans-serif;
  color: #eee;

  /* Full original background, fixed to avoid scroll interference */
  background: url('IMG_0685.jpeg') no-repeat center center fixed;
  background-size: cover; /* Fill the screen */
}

/* =========================
   🩸 MASSIVE BLOOD INTRO
========================= */

.intro-text {
  font-family:'Creepster', cursive;
  font-size:48px;
  color:#b30000;
  text-align:center;
  letter-spacing:6px;

  text-shadow:
    0 0 10px #ff0000,
    0 0 25px #8b0000,
    0 0 40px #000;

  animation: drip 2s infinite alternate;
}

/* dripping illusion */
@keyframes drip {
  0% { transform:translateY(0); }
  100% { transform:translateY(6px); }
}

/* =========================
   ⚠️ CAUTION TEXT
========================= */

.caution {
  font-family:'Creepster', cursive;
  font-size:12px;
  text-align:center;
  color:#8b0000;
  margin-top:10px;
  opacity:0.8;
}

/* =========================
   🩸 LOADER
========================= */

#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#loader.hide {
  opacity:0;
  transition:1s;
  pointer-events:none;
}

/* =========================
   ☰ MENU
========================= */

.menu-btn{
  position:absolute;
  left:20px;
  top:30px;
  font-size:22px;
  cursor:pointer;
}

.side-menu{
  position:fixed;
  left:-100%;
  top:0;
  width:260px;
  height:100%;
  background:#0a0a0a;
  padding:40px 20px;
  transition:0.4s ease;
  z-index:4000;
}

.side-menu.active{ left:0; }

.side-menu a{
  display:block;
  margin:20px 0;
  color:#aaa;
  text-decoration:none;
}

/* =========================
   HEADER
========================= */

header {
  text-align:center;
  padding:25px;
  border-bottom:1px solid #222;
  position:relative;
}

header h1 {
  font-family:'Creepster', cursive;
  color:#b30000;
  font-size:28px;
}

/* =========================
   GRID
========================= */

.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px 20px;
  padding:40px 20px;
}

/* CARD */
.card { cursor:pointer; }

.card img {
  width:100%;
  height:240px;
  object-fit:cover;
}

.name { font-size:13px; margin-top:10px; }
.price { font-size:12px; color:#777; }
.stock { color:red; font-size:11px; }

/* =========================
   MODAL (SMOOTH)
========================= */

#modal {
  position:fixed;
  bottom:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.96);
  transform:translateY(100%);
  transition:transform 0.55s cubic-bezier(0.22,1,0.36,1);
  z-index:2000;
  padding-top:60px;
}

#modal.active {
  transform:translateY(0);
}

/* CLOSE */
.close {
  position:fixed;
  top:65px;
  right:20px;
  font-size:24px;
  cursor:pointer;
  z-index:3000;
}

/* GALLERY */
.gallery {
  overflow:hidden;
  position:relative;
}

.gallery-track {
  display:flex;
  transition:0.6s;
}

.gallery img {
  width:100%;
  flex:0 0 100%;
  opacity:0.6;
  filter:blur(6px);
}

.gallery img.active {
  opacity:1;
  filter:blur(0);
}

/* ARROWS */
.arrow {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  padding:8px;
  cursor:pointer;
}

.arrow.left { left:10px; }
.arrow.right { right:10px; }

/* DOTS */
.dots { text-align:center; }

.dot {
  width:6px;
  height:6px;
  background:#555;
  display:inline-block;
  margin:5px;
  border-radius:50%;
}

.dot.active {
  width:16px;
  background:#fff;
}

/* DM */
#dmPreview {
  margin:20px;
  font-size:12px;
  color:#aaa;
}

.buy-btn {
  margin:20px;
  padding:15px;
  border:1px solid #fff;
  text-align:center;
  cursor:pointer;
}

/* INSTAGRAM */
.insta {
  text-align:center;
  margin:60px 0;
}

/* =========================
   ⚠️ BOTTOM DISCLAIMER
========================= */

.footer-warning {
  text-align:center;
  font-family:'Creepster', cursive;
  font-size:11px;
  color:#8b0000;
  margin-bottom:30px;
  opacity:0.7;
}

</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="side-menu" id="menu">
  <a href="#">Home</a>
  <a href="#">Archive</a>
  <a href="#">Contact</a>
</div>

<!-- LOADER WITH BLOOD INTRO -->
<div id="loader">
  <div class="intro-text">VAMP SELECTION</div>
  <div class="caution">⚠️ REPS / ARCHIVE ITEMS – ENTER AT YOUR OWN RISK</div>
</div>

<header>
  <h1>VAMP SELECTION</h1>
</header>

<section class="container">

<div class="card" onclick="openModal('rick')">
  <img src="IMG_0653.webp">
  <div class="name">Rick Owens<br>Geobasket</div>
  <div class="price">¥9,5000</div>
  <div class="stock">Only 1 left</div>
</div>

<div class="card" onclick="openModal('balenciaga')">
  <img src="IMG_0663.jpeg">
  <div class="name">Balenciaga Mule</div>
  <div class="price">¥4,5000</div>
</div>

</section>

<div class="insta">
  FOLLOW FOR MORE<br>
  <a href="https://www.instagram.com/daggerdick_77/" target="_blank">Instagram</a>
</div>

<!-- ⚠️ BOTTOM WARNING -->
<div class="footer-warning">
⚠️ ALL PRODUCTS ARE REPS / FOR FASHION PURPOSES ONLY — FOLLOW FOR MORE
</div>

<div id="modal">
  <div class="close" onclick="closeModal()">❌</div>
  <div id="modalContent"></div>
  <div id="dmPreview"></div>
  <div class="buy-btn" onclick="buyNow()">DM US ON INSTAGRAM</div>
</div>

<script>

/* MENU */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

/* LOADER */
window.onload=()=>{
  setTimeout(()=>loader.classList.add("hide"),1600);
};

let currentProduct="";
let currentIndex=0;
let totalImages=0;

function openModal(product){

  if(product==="rick"){
    currentProduct="Rick Owens Geobasket";
    totalImages=2;
    modalContent.innerHTML=createGallery([
      "IMG_0653.webp",
      "IMG_0537.jpeg"
    ]);
  }

  if(product==="balenciaga"){
    currentProduct="Balenciaga Mule";
    totalImages=2;
    modalContent.innerHTML=createGallery([
      "IMG_0663.jpeg",
      "IMG_0506.jpeg"
    ]);
  }

  currentIndex=0;
  setTimeout(updateGallery,50);

  dmPreview.innerText="I want to buy: "+currentProduct;

  document.getElementById("modal").classList.add("active");
}

function createGallery(images){
  return `
    <div class="gallery">
      <div class="gallery-track" id="track">
        ${images.map(img=>`<img src="${img}">`).join("")}
      </div>
      <div class="arrow left" onclick="prev()">←</div>
      <div class="arrow right" onclick="next()">→</div>
    </div>
    <div class="dots">
      ${images.map((_,i)=>`<span class="dot" id="dot${i}"></span>`).join("")}
    </div>
  `;
}

function updateGallery(){
  const track=document.getElementById("track");
  const images=document.querySelectorAll("#track img");

  track.style.transform="translateX(-"+(currentIndex*100)+"%)";

  images.forEach((img,i)=>{
    img.classList.toggle("active",i===currentIndex);
  });

  for(let i=0;i<totalImages;i++){
    document.getElementById("dot"+i).classList.remove("active");
  }
  document.getElementById("dot"+currentIndex).classList.add("active");
}

function next(){
  if(currentIndex<totalImages-1){
    currentIndex++;
    updateGallery();
  }
}

function prev(){
  if(currentIndex>0){
    currentIndex--;
    updateGallery();
  }
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function buyNow(){
  navigator.clipboard.writeText("I want to buy: "+currentProduct);
  window.open("https://www.instagram.com/daggerdick_77/");
}

</script>

</body>
</
