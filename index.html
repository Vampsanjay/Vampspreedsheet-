<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vamp Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#050505;
  color:#eee;
  font-family:'Unbounded', sans-serif;
}

/* HEADER */
header {
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  border-bottom:1px solid #222;
  position:relative;
}

h1 {
  letter-spacing:5px;
  font-size:18px;
}

.menu-btn {
  position:absolute;
  left:20px;
  font-size:22px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#000;
  border-right:1px solid #222;
  transition:0.3s;
  padding:30px 20px;
  z-index:1000;
}

.sidebar a {
  display:block;
  margin:20px 0;
  color:#777;
  text-decoration:none;
}

.sidebar a:hover {
  color:#fff;
}

/* OVERLAY */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
}

/* SECTION TITLE */
.section-title {
  padding-left:30px;
  color:#666;
  font-size:12px;
  margin-top:20px;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
  padding:30px;
}

/* CARD */
.card {
  background:#0d0d0d;
  border:1px solid #222;
  cursor:pointer;
  transition:0.3s;
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 0.6s forwards;
}

@keyframes fadeUp {
  to {opacity:1; transform:translateY(0);}
}

.card:hover {
  transform:scale(1.03);
  box-shadow:0 0 25px rgba(255,255,255,0.08);
}

.card img {
  width:100%;
  height:300px;
  object-fit:cover;
  filter:grayscale(100%);
}

.card:hover img {
  filter:grayscale(0%);
}

.card-content {
  padding:15px;
}

.price {
  color:#888;
  font-size:12px;
}

.viewers {
  font-size:11px;
  color:#aaa;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  overflow:auto;
  z-index:2000;
}

.gallery {
  display:flex;
  overflow-x:auto;
}

.gallery img {
  width:100%;
  flex-shrink:0;
}

/* CLOSE */
.close {
  position:fixed;
  top:20px;
  right:20px;
  font-size:20px;
  cursor:pointer;
}

/* DM BOX */
.dm-box {
  margin:20px;
  padding:10px;
  border:1px solid #333;
  font-size:12px;
  color:#aaa;
}

/* BUY */
.buy-btn {
  margin:20px;
  padding:15px;
  border:1px solid #fff;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="sidebar" class="sidebar">
  <a onclick="filter('all'); closeMenu()">ALL ITEMS</a>
  <a onclick="filter('shoes'); closeMenu()">SHOES</a>
  <a onclick="filter('new'); closeMenu()">NEW DROPS</a>
</div>

<div id="overlay" class="overlay" onclick="closeMenu()"></div>

<header>
  <div class="menu-btn" onclick="openMenu()">☰</div>
  <h1>VAMP SELECTION</h1>
</header>

<h2 class="section-title">NEW</h2>

<section class="container">

<div class="card" data-type="shoes new" onclick="openModal('rick')">
  <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk-Product.jpg">
  <div class="card-content">
    RICK OWENS GEOBASKET
    <div class="price">¥120,000</div>
    <div class="viewers">18 viewing</div>
    <div style="color:red;font-size:11px;">Only 1 left</div>
  </div>
</div>

<div class="card" data-type="shoes new" onclick="openModal('balenciaga')">
  <img src="https://balenciaga.dam.kering.com/m/2d3e9f1f6e0f7a0f/Medium-677390W2F701000_F.jpg">
  <div class="card-content">
    BALENCIAGA FURRY MULE
    <div class="price">¥95,000</div>
    <div class="viewers">9 viewing</div>
  </div>
</div>

<div class="card" data-type="shoes" onclick="openModal('rick2')">
  <img src="https://images.stockx.com/images/Rick-Owens-Ramones-Black.png">
  <div class="card-content">
    RICK OWENS RAMONES
    <div class="price">¥110,000</div>
    <div class="viewers">14 viewing</div>
  </div>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="close" onclick="closeModal()">✕</div>
  <div id="modalContent"></div>
  <div id="dmPreview" class="dm-box"></div>
  <div class="buy-btn" onclick="buyNow()">SEND DM</div>
</div>

<script>
let currentProduct = "";

/* MENU */
function openMenu(){
  sidebar.style.left="0";
  overlay.style.display="block";
}

function closeMenu(){
  sidebar.style.left="-260px";
  overlay.style.display="none";
}

/* FILTER */
function filter(type){
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=(type==="all"||c.dataset.type.includes(type))?"block":"none";
  });
}

/* MODAL */
function openModal(product){

  if(product==="rick"){
    currentProduct="Rick Owens Geobasket Black Milk";
    modalContent.innerHTML=`
      <div class="gallery">
        <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk-Product.jpg">
        <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk.png">
      </div>`;
  }

  if(product==="balenciaga"){
    currentProduct="Balenciaga Furry Mule";
    modalContent.innerHTML=`
      <div class="gallery">
        <img src="https://balenciaga.dam.kering.com/m/2d3e9f1f6e0f7a0f/Medium-677390W2F701000_F.jpg">
      </div>`;
  }

  if(product==="rick2"){
    currentProduct="Rick Owens Ramones";
    modalContent.innerHTML=`
      <div class="gallery">
        <img src="https://images.stockx.com/images/Rick-Owens-Ramones-Black.png">
      </div>`;
  }

  dmPreview.innerText="Message:\nI want to buy: "+currentProduct;

  modal.style.display="block";
}

function closeModal(){
  modal.style.display="none";
}

/* BUY */
function buyNow(){
  let msg="I want to buy: "+currentProduct;
  navigator.clipboard.writeText(msg);
  window.open("https://www.instagram.com/daggerdick_77/","_blank");
}
</script>

</body>
</html>
