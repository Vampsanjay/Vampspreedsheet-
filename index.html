<<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vamp Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  background:#050505;
  color:#eee;
  font-family:'Unbounded', sans-serif;
}

/* HEADER */
header {
  text-align:center;
  padding:25px;
  border-bottom:1px solid #222;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px 20px;
  padding:40px 20px;
}

/* CARD */
.card {
  cursor:pointer;
}

.card img {
  width:100%;
  height:240px;
  object-fit:cover;
}

.name { margin-top:12px; font-size:13px; }
.price { font-size:12px; color:#777; }
.stock { color:red; font-size:11px; }

/* MODAL */
#modal {
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.96);
  backdrop-filter:blur(10px);
  transition:0.5s ease;
  z-index:2000;
  padding-top:60px;
  pointer-events:none;
}

#modal.active {
  bottom:0;
  pointer-events:auto;
}

/* CLOSE */
.close {
  position:fixed;
  top:20px;
  right:20px;
  font-size:24px;
  z-index:3000;
  background:rgba(0,0,0,0.6);
  padding:8px 12px;
  border-radius:8px;
}

/* GALLERY */
.gallery {
  position:relative;
  overflow:hidden;
}

.gallery-track {
  display:flex;
  transition:transform 0.4s ease;
}

.gallery img {
  width:100%;
  flex:0 0 100%;
}

/* ARROWS */
.arrow {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:22px;
  background:rgba(0,0,0,0.5);
  padding:8px 12px;
  cursor:pointer;
  z-index:10;
}

.arrow.left { left:10px; }
.arrow.right { right:10px; }

/* DOTS */
.dots {
  text-align:center;
  margin-top:10px;
}

.dot {
  display:inline-block;
  width:6px;
  height:6px;
  margin:4px;
  background:#555;
  border-radius:50%;
}

.dot.active {
  background:#fff;
}

/* DM */
#dmPreview {
  margin:20px;
  font-size:12px;
  color:#aaa;
}

.buy-btn {
  margin:20px;
  padding:15px;
  border:1px solid #fff;
  text-align:center;
  cursor:pointer;
}

.buy-btn:hover {
  background:#fff;
  color:#000;
}

/* INSTAGRAM */
.insta {
  margin:60px 0;
  text-align:center;
  font-size:12px;
  color:#888;
}

.insta a {
  display:inline-block;
  margin-top:10px;
  padding:10px 20px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
}

</style>
</head>

<body>

<header>
  <h1>VAMP SELECTION</h1>
</header>

<section class="container">

<div class="card" onclick="openModal('rick')">
  <img src="IMG_0653.webp">
  <div class="name">Rick Owens<br>Geobasket Black Milk</div>
  <div class="price">¥120,000</div>
  <div class="stock">Only 1 left</div>
</div>

<div class="card" onclick="openModal('balenciaga')">
  <img src="IMG_0663.jpeg">
  <div class="name">Balenciaga<br>Furry Mule</div>
  <div class="price">¥95,000</div>
</div>

</section>

<div class="insta">
  ARCHIVE ENERGY — FOLLOW FOR MORE  
  <br>
  <a href="https://www.instagram.com/daggerdick_77/" target="_blank">
    Instagram ↗
  </a>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="close" onclick="closeModal()">❌</div>

  <div id="modalContent"></div>

  <div id="dmPreview"></div>

  <div class="buy-btn" onclick="buyNow()">DM US ON INSTAGRAM</div>
</div>

<script>

let currentProduct="";
let currentIndex=0;
let totalImages=0;

/* OPEN */
function openModal(product){

  if(product==="rick"){
    currentProduct="Rick Owens Geobasket Black Milk";
    totalImages=2;
    modalContent.innerHTML=createGallery([
      "IMG_0653.webp",
      "IMG_0537.jpeg"
    ]);
  }

  if(product==="balenciaga"){
    currentProduct="Balenciaga Furry Mule";
    totalImages=2;
    modalContent.innerHTML=createGallery([
      "IMG_0663.jpeg",
      "IMG_0506.jpeg"
    ]);
  }

  currentIndex=0;
  updateGallery();

  dmPreview.innerText="Message:\nI want to buy: "+currentProduct;
  document.getElementById("modal").classList.add("active");
}

/* GALLERY HTML */
function createGallery(images){
  return `
    <div class="gallery">
      <div class="gallery-track" id="track">
        ${images.map(img=>`<img src="${img}">`).join("")}
      </div>

      <div class="arrow left" onclick="prev()">←</div>
      <div class="arrow right" onclick="next()">→</div>
    </div>

    <div class="dots" id="dots">
      ${images.map((_,i)=>`<span class="dot" id="dot${i}"></span>`).join("")}
    </div>
  `;
}

/* UPDATE */
function updateGallery(){
  document.getElementById("track").style.transform =
    "translateX(-"+(currentIndex*100)+"%)";

  for(let i=0;i<totalImages;i++){
    document.getElementById("dot"+i).classList.remove("active");
  }
  document.getElementById("dot"+currentIndex).classList.add("active");
}

/* ARROWS */
function next(){
  if(currentIndex < totalImages-1){
    currentIndex++;
    updateGallery();
  }
}

function prev(){
  if(currentIndex > 0){
    currentIndex--;
    updateGallery();
  }
}

/* CLOSE */
function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

/* DM */
function buyNow(){
  let msg="I want to buy: "+currentProduct;
  navigator.clipboard.writeText(msg);
  window.open("https://www.instagram.com/daggerdick_77/","_blank");
}

</script>

</body>
</html>
