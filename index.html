<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vamp Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#050505;
  color:#eee;
  font-family:'Unbounded', sans-serif;
}

/* HEADER */
header {
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  border-bottom:1px solid #222;
  position:relative;
}

h1 {
  font-size:16px;
  letter-spacing:4px;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px 20px;
  padding:30px 20px;
}

/* CARD */
.card {
  opacity:0;
  transform:translateY(30px);
  transition:all 0.8s ease;
  cursor:pointer;
}

.card.show {
  opacity:1;
  transform:translateY(0);
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
  transition:0.6s ease;
}

.card:hover img {
  transform:scale(1.05);
  opacity:0.85;
}

/* TEXT */
.name {
  margin-top:10px;
  font-size:13px;
  line-height:1.4;
}

.price {
  margin-top:5px;
  font-size:12px;
  color:#777;
}

.stock {
  color:red;
  font-size:11px;
}

/* MODAL */
#modal {
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  transition:0.5s ease;
  z-index:2000;
}

#modal.active {
  bottom:0;
}

.gallery img {
  width:100%;
}

/* CLOSE */
.close {
  position:fixed;
  top:20px;
  right:20px;
  font-size:20px;
  cursor:pointer;
}

/* DM */
#dmPreview {
  margin:20px;
  font-size:12px;
  color:#aaa;
}

.buy-btn {
  margin:20px;
  padding:15px;
  border:1px solid #fff;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.buy-btn:hover {
  background:#fff;
  color:#000;
}
</style>
</head>

<body>

<header>
  <h1>VAMP SELECTION</h1>
</header>

<section class="container">

<!-- RICK -->
<div class="card" onclick="openModal('rick')">
  <img src="IMG_0653.webp">
  <div class="name">Rick Owens<br>Geobasket Black Milk</div>
  <div class="price">¥120,000</div>
  <div class="stock">Only 1 left</div>
</div>

<!-- BALENCIAGA -->
<div class="card" onclick="openModal('balenciaga')">
  <img src="IMG_0663.jpeg">
  <div class="name">Balenciaga<br>Furry Mule</div>
  <div class="price">¥95,000</div>
</div>

</section>

<!-- MODAL -->
<div id="modal">
  <div class="close" onclick="closeModal()">✕</div>

  <div id="modalContent"></div>

  <div id="dmPreview"></div>

  <div class="buy-btn" onclick="buyNow()">DM US ON INSTAGRAM</div>
</div>

<script>
let currentProduct = "";

/* FADE-IN ON SCROLL */
const cards = document.querySelectorAll('.card');
window.addEventListener('scroll', () => {
  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    if(rect.top < window.innerHeight - 50){
      card.classList.add('show');
    }
  });
});

/* LOAD ANIMATION */
window.onload = () => {
  cards.forEach((card,i)=>{
    setTimeout(()=>card.classList.add('show'), i*150);
  });
};

/* MODAL */
function openModal(product){
  if(product==="rick"){
    currentProduct="Rick Owens Geobasket Black Milk";
    modalContent.innerHTML=`<div class="gallery">
      <img src="IMG_0653.webp">
    </div>`;
  }

  if(product==="balenciaga"){
    currentProduct="Balenciaga Furry Mule";
    modalContent.innerHTML=`<div class="gallery">
      <img src="IMG_0663.jpeg">
    </div>`;
  }

  dmPreview.innerText="Message:\nI want to buy: "+currentProduct;

  document.getElementById("modal").classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

/* BUY */
function buyNow(){
  let msg="I want to buy: "+currentProduct;
  navigator.clipboard.writeText(msg);
  window.open("https://www.instagram.com/daggerdick_77/","_blank");
}
</script>

</body>
</html>
