<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vamp Selection</title>

<!-- REVENGE STYLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Unbounded:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* =========================
   🌲 BACKGROUND
========================= */

body {
  margin:0;
  font-family:'Unbounded', sans-serif;
  color:#eee;

  background:
  linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
  url('https://images.unsplash.com/photo-1470770903676-69b98201ea1c?grayscale')
  no-repeat center/cover fixed;
}

/* =========================
   🩸 EVIL TITLE FONT
========================= */

header h1 {
  font-family:'Creepster', cursive;
  color:#b30000;
  font-size:28px;
  letter-spacing:4px;

  text-shadow:
    0 0 5px #ff0000,
    0 0 15px #8b0000,
    0 0 30px #000;

  animation:flicker 2.5s infinite;
}

/* subtle evil flicker */
@keyframes flicker {
  0%,18%,22%,25%,53%,57%,100% { opacity:1; }
  20%,24%,55% { opacity:0.4; }
}

/* =========================
   🩸 LOADER
========================= */

#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.blood {
  font-family:'Creepster', cursive;
  color:#8b0000;
  font-size:26px;
  letter-spacing:6px;
}

#loader.hide {
  opacity:0;
  transition:1s;
  pointer-events:none;
}

/* =========================
   ☰ MENU
========================= */

.menu-btn{
  position:absolute;
  left:20px;
  top:30px;
  font-size:22px;
  cursor:pointer;
}

.side-menu{
  position:fixed;
  left:-100%;
  top:0;
  width:260px;
  height:100%;
  background:#0a0a0a;
  padding:40px 20px;
  transition:0.4s ease;
  z-index:4000;
}

.side-menu.active{ left:0; }

.side-menu a{
  display:block;
  margin:20px 0;
  color:#aaa;
  text-decoration:none;
}

/* =========================
   HEADER
========================= */

header {
  text-align:center;
  padding:25px;
  border-bottom:1px solid #222;
  position:relative;
}

/* =========================
   GRID
========================= */

.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px 20px;
  padding:40px 20px;
}

/* CARD */
.card { cursor:pointer; }

.card img {
  width:100%;
  height:240px;
  object-fit:cover;
}

.name { font-size:13px; margin-top:10px; }
.price { font-size:12px; color:#777; }
.stock { color:red; font-size:11px; }

/* =========================
   🚀 MODAL (FIXED SMOOTH)
========================= */

#modal {
  position:fixed;
  bottom:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.96);

  transform:translateY(100%);
  transition:transform 0.55s cubic-bezier(0.22,1,0.36,1);

  will-change:transform;
  z-index:2000;
  padding-top:60px;
}

#modal.active {
  transform:translateY(0);
}

/* CLOSE */
.close {
  position:fixed;
  top:65px;
  right:20px;
  font-size:24px;
  cursor:pointer;
  z-index:3000;
}

/* =========================
   GALLERY
========================= */

.gallery {
  overflow:hidden;
  position:relative;
}

.gallery-track {
  display:flex;
  transition:transform 0.6s ease;
  will-change:transform;
}

.gallery img {
  width:100%;
  flex:0 0 100%;
  opacity:0.6;
  filter:blur(6px);
  transition:0.6s;
}

.gallery img.active {
  opacity:1;
  filter:blur(0);
}

/* ARROWS */
.arrow {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  padding:8px;
  cursor:pointer;
}

.arrow.left { left:10px; }
.arrow.right { right:10px; }

/* DOTS */
.dots { text-align:center; }

.dot {
  width:6px;
  height:6px;
  background:#555;
  display:inline-block;
  margin:5px;
  border-radius:50%;
}

.dot.active {
  width:16px;
  background:#fff;
}

/* DM */
#dmPreview {
  margin:20px;
  font-size:12px;
  color:#aaa;
}

.buy-btn {
  margin:20px;
  padding:15px;
  border:1px solid #fff;
  text-align:center;
  cursor:pointer;
}

/* INSTAGRAM */
.insta {
  text-align:center;
  margin:60px 0;
}

</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="side-menu" id="menu">
  <a href="#">Home</a>
  <a href="#">Archive</a>
  <a href="#">Contact</a>
</div>

<div id="loader">
  <h1 class="blood">VAMP SELECTION</h1>
</div>

<header>
  <h1>VAMP SELECTION</h1>
</header>

<section class="container">

<div class="card" onclick="openModal('rick')">
  <img src="IMG_0653.webp">
  <div class="name">Rick Owens<br>Geobasket</div>
  <div class="price">¥120,000</div>
  <div class="stock">Only 1 left</div>
</div>

<div class="card" onclick="openModal('balenciaga')">
  <img src="IMG_0663.jpeg">
  <div class="name">Balenciaga Mule</div>
  <div class="price">¥95,000</div>
</div>

</section>

<div class="insta">
  FOLLOW FOR MORE<br>
  <a href="https://www.instagram.com/daggerdick_77/" target="_blank">Instagram</a>
</div>

<div id="modal">
  <div class="close" onclick="closeModal()">❌</div>
  <div id="modalContent"></div>
  <div id="dmPreview"></div>
  <div class="buy-btn" onclick="buyNow()">DM US ON INSTAGRAM</div>
</div>

<script>

/* MENU */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

/* LOADER */
window.onload=()=>{
  setTimeout(()=>loader.classList.add("hide"),1200);
};

let currentProduct="";
let currentIndex=0;
let totalImages=0;

function openModal(product){

  if(product==="rick"){
    currentProduct="Rick Owens Geobasket";
    totalImages=2;
    modalContent.innerHTML=createGallery([
      "IMG_0653.webp",
      "IMG_0537.jpeg"
    ]);
  }

  if(product==="balenciaga"){
    currentProduct="Balenciaga Mule";
    totalImages=2;
    modalContent.innerHTML=createGallery([
      "IMG_0663.jpeg",
      "IMG_0506.jpeg"
    ]);
  }

  currentIndex=0;
  setTimeout(updateGallery,50);

  dmPreview.innerText="I want to buy: "+currentProduct;

  document.getElementById("modal").classList.add("active");
}

function createGallery(images){
  return `
    <div class="gallery">
      <div class="gallery-track" id="track">
        ${images.map(img=>`<img src="${img}">`).join("")}
      </div>
      <div class="arrow left" onclick="prev()">←</div>
      <div class="arrow right" onclick="next()">→</div>
    </div>
    <div class="dots">
      ${images.map((_,i)=>`<span class="dot" id="dot${i}"></span>`).join("")}
    </div>
  `;
}

function updateGallery(){
  const track=document.getElementById("track");
  const images=document.querySelectorAll("#track img");

  track.style.transform="translateX(-"+(currentIndex*100)+"%)";

  images.forEach((img,i)=>{
    img.classList.toggle("active",i===currentIndex);
  });

  for(let i=0;i<totalImages;i++){
    document.getElementById("dot"+i).classList.remove("active");
  }
  document.getElementById("dot"+currentIndex).classList.add("active");
}

function next(){
  if(currentIndex<totalImages-1){
    currentIndex++;
    updateGallery();
  }
}

function prev(){
  if(currentIndex>0){
    currentIndex--;
    updateGallery();
  }
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function buyNow(){
  navigator.clipboard.writeText("I want to buy: "+currentProduct);
  window.open("https://www.instagram.com/daggerdick_77/");
}

</script>

</body>
</html>
