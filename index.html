<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vamp Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#0a0a0a;
  color:#eee;
  font-family:'Unbounded', sans-serif;
}

header {
  text-align:center;
  padding:30px;
  border-bottom:1px solid #222;
}

h1 {
  letter-spacing:4px;
}

.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
  padding:40px;
}

.card {
  background:#111;
  border:1px solid #222;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
}

.card img {
  width:100%;
  height:300px;
  object-fit:cover;
  filter:grayscale(100%);
}

.card-content {
  padding:20px;
}

.price {
  color:#888;
  font-size:12px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  overflow-y:auto;
}

.modal-content {
  padding:20px;
}

.modal img {
  width:100%;
  margin-bottom:20px;
}

.close {
  position:fixed;
  top:20px;
  right:20px;
  font-size:20px;
  cursor:pointer;
}

.buy-btn {
  display:block;
  text-align:center;
  padding:15px;
  border:1px solid #fff;
  margin:20px;
  text-decoration:none;
  color:#fff;
}
</style>
</head>

<body>

<header>
<h1>VAMP SELECTION</h1>
<p>Dark Archive Fashion</p>
</header>

<section class="container">

<div class="card" onclick="openModal('rick')">
  <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk.png">
  <div class="card-content">
    RICK OWENS ジオバスケット BLACK MILK
    <div class="price">¥120,000</div>
  </div>
</div>

<div class="card" onclick="openModal('balenciaga')">
  <img src="https://balenciaga.dam.kering.com/m/2d3e9f1f6e0f7a0f/Medium-677390W2F701000_F.jpg">
  <div class="card-content">
    BALENCIAGA FURRY ミュール
    <div class="price">¥95,000</div>
  </div>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <span class="close" onclick="closeModal()">✕</span>
  <div class="modal-content" id="modalContent"></div>

<a class="buy-btn" href="https://www.instagram.com/direct/t/username/?text=I%20want%20to%20buy%20this%20item" target="_blank">
  DM TO BUY ON INSTAGRAM
</a>

<script>
function openModal(product) {
  const modal = document.getElementById("modal");
  const content = document.getElementById("modalContent");

  if(product === 'rick') {
    content.innerHTML = `
      <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk.png">
      <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk-Product.jpg">
      <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk-Detail.jpg">
    `;
  }

  if(product === 'balenciaga') {
    content.innerHTML = `
      <img src="https://balenciaga.dam.kering.com/m/2d3e9f1f6e0f7a0f/Medium-677390W2F701000_F.jpg">
      <img src="https://balenciaga.dam.kering.com/m/abc123/Medium-Detail.jpg">
    `;
  }

  modal.style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
