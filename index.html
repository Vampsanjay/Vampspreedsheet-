<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vamp Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
  margin:0;
  background:#050505;
  color:#eee;
  font-family:'Unbounded', sans-serif;
}

/* 🩸 LOADER */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  flex-direction:column;
  overflow:hidden;
}

/* BLOOD TEXT */
.blood {
  position:relative;
  color:#8b0000;
  font-size:22px;
  letter-spacing:6px;
  animation:pulse 1.5s infinite;
  text-shadow:0 0 10px rgba(139,0,0,0.6);
}

/* MULTI DRIPS */
.blood::before,
.blood::after {
  content:'';
  position:absolute;
  background:#8b0000;
  width:2px;
  height:0;
  bottom:-5px;
  animation:drip 2s infinite;
  opacity:0.8;
}

.blood::before {
  left:30%;
  animation-delay:0.2s;
}

.blood::after {
  left:65%;
  animation-delay:0.6s;
}

@keyframes drip {
  0% { height:0; opacity:0; }
  40% { height:18px; opacity:1; }
  100% { height:0; opacity:0; }
}

@keyframes pulse {
  0% {opacity:0.5; transform:scale(0.95);}
  50% {opacity:1; transform:scale(1);}
  100% {opacity:0.5; transform:scale(0.95);}
}

/* CINEMATIC EXIT */
#loader.hide {
  opacity:0;
  transform:scale(1.1);
  transition:1.2s cubic-bezier(0.22,1,0.36,1);
  pointer-events:none;
}

/* HEADER */
header {
  text-align:center;
  padding:25px;
  border-bottom:1px solid #222;
}

h1 {
  font-size:16px;
  letter-spacing:4px;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px 20px;
  padding:40px 20px;
}

/* CARD */
.card { cursor:pointer; }

.card img {
  width:100%;
  height:240px;
  object-fit:cover;
}

.name { margin-top:12px; font-size:13px; }
.price { font-size:12px; color:#777; }
.stock { color:red; font-size:11px; }

/* MODAL */
#modal {
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.96);
  backdrop-filter:blur(10px);
  transition:0.6s cubic-bezier(0.22,1,0.36,1);
  z-index:2000;
  padding-top:60px;
  pointer-events:none;
}

#modal.active {
  bottom:0;
  pointer-events:auto;
}

/* ❌ CLOSE */
.close {
  position:fixed;
  top:60px;
  right:20px;
  font-size:24px;
  z-index:3000;
  background:rgba(0,0,0,0.6);
  padding:8px 12px;
  border-radius:8px;
  backdrop-filter:blur(6px);
  cursor:pointer;
}

/* GALLERY */
.gallery { position:relative; overflow:hidden; }

.gallery-track {
  display:flex;
  transition:transform 0.6s cubic-bezier(0.22,1,0.36,1);
}

.gallery img {
  width:100%;
  flex:0 0 100%;
  filter:blur(6px);
  opacity:0.6;
  transform:scale(1.05);
  transition:all 0.8s ease;
}

.gallery img.active {
  filter:blur(0);
  opacity:1;
  transform:scale(1);
}

/* ARROWS */
.arrow {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:22px;
  background:rgba(0,0,0,0.5);
  padding:8px 12px;
  cursor:pointer;
  z-index:10;
}

.arrow.left { left:10px; }
.arrow.right { right:10px; }

/* DOTS */
.dots { text-align:center; margin-top:10px; }

.dot {
  display:inline-block;
  width:6px;
  height:6px;
  margin:5px;
  background:#555;
  border-radius:50%;
  transition:all 0.4s ease;
}

.dot.active {
  width:16px;
  border-radius:10px;
  background:#fff;
}

/* DM */
#dmPreview {
  margin:20px;
  font-size:12px;
  color:#aaa;
}

.buy-btn {
  margin:20px;
  padding:15px;
  border:1px solid #fff;
  text-align:center;
  cursor:pointer;
}

.buy-btn:hover {
  background:#fff;
  color:#000;
}

/* INSTAGRAM */
.insta {
  margin:60px 0;
  text-align:center;
  font-size:12px;
  color:#888;
}

.insta a {
  display:inline-block;
  margin-top:10px;
  padding:10px 20px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
}

.insta a:hover {
  background:#fff;
  color:#000;
}

</style>
</head>

<body>

<!-- 🔊 SOUND -->
<audio id="introSound" src="intro.mp3"></audio>

<!-- 🩸 LOADER -->
<div id="loader">
  <h1 class="blood">VAMP SELECTION</h1>
</div>

<header>
  <h1>VAMP SELECTION</h1>
</header>

<section class="container">

<div class="card" onclick="openModal('rick')">
  <img src="IMG_0653.webp">
  <div class="name">Rick Owens<br>Geobasket Black Milk</div>
  <div class="price">¥120,000</div>
  <div class="stock">Only 1 left</div>
</div>

<div class="card" onclick="openModal('balenciaga')">
  <img src="IMG_0663.jpeg">
  <div class="name">Balenciaga<br>Furry Mule</div>
  <div class="price">¥95,000</div>
</div>

</section>

<div class="insta">
  ARCHIVE ENERGY — FOLLOW FOR MORE  
  <br>
  <a href="https://www.instagram.com/daggerdick_77/" target="_blank">
    Instagram ↗
  </a>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="close" onclick="closeModal()">❌</div>
  <div id="modalContent"></div>
  <div id="dmPreview"></div>
  <div class="buy-btn" onclick="buyNow()">DM US ON INSTAGRAM</div>
</div>

<script>

/* LOADER */
window.onload = () => {
  const sound = document.getElementById("introSound");
  if(sound){
    sound.volume = 0.3;
    sound.play().catch(()=>{});
  }

  setTimeout(()=>{
    document.getElementById("loader").classList.add("hide");
  },1400);
};

let currentProduct="";
let currentIndex=0;
let totalImages=0;

function openModal(product){

  if(product==="rick"){
    currentProduct="Rick Owens Geobasket Black Milk";
    totalImages=2;
    modalContent.innerHTML=createGallery([
      "IMG_0653.webp",
      "IMG_0537.jpeg"
    ]);
  }

  if(product==="balenciaga"){
    currentProduct="Balenciaga Furry Mule";
    totalImages=2;
    modalContent.innerHTML=createGallery([
      "IMG_0663.jpeg",
      "IMG_0506.jpeg"
    ]);
  }

  currentIndex=0;
  setTimeout(updateGallery,50);

  dmPreview.innerText="Message:\nI want to buy: "+currentProduct;

  document.getElementById("modal").classList.add("active");
}

function createGallery(images){
  return `
    <div class="gallery">
      <div class="gallery-track" id="track">
        ${images.map(img=>`<img src="${img}">`).join("")}
      </div>
      <div class="arrow left" onclick="prev()">←</div>
      <div class="arrow right" onclick="next()">→</div>
    </div>
    <div class="dots">
      ${images.map((_,i)=>`<span class="dot" id="dot${i}"></span>`).join("")}
    </div>
  `;
}

function updateGallery(){
  const images=document.querySelectorAll("#track img");

  document.getElementById("track").style.transform =
    "translateX(-"+(currentIndex*100)+"%)";

  images.forEach((img,i)=>{
    img.classList.remove("active");
    if(i===currentIndex){
      img.classList.add("active");
    }
  });

  for(let i=0;i<totalImages;i++){
    document.getElementById("dot"+i).classList.remove("active");
  }
  document.getElementById("dot"+currentIndex).classList.add("active");
}

function next(){
  if(currentIndex<totalImages-1){
    currentIndex++;
    updateGallery();
  }
}

function prev(){
  if(currentIndex>0){
    currentIndex--;
    updateGallery();
  }
}

function closeModal(){
  const modal=document.getElementById("modal");
  modal.classList.remove("active");

  setTimeout(()=>{
    modalContent.innerHTML="";
    dmPreview.innerText="";
    currentProduct="";
  },300);
}

function buyNow(){
  let msg="I want to buy: "+currentProduct;
  navigator.clipboard.writeText(msg);
  window.open("https://www.instagram.com/daggerdick_77/","_blank");
}

</script>

</body>
</html>
