<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vamp Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#0a0a0a;
  color:#eee;
  font-family:'Unbounded', sans-serif;
}

/* HEADER */
header {
  text-align:center;
  padding:30px;
  border-bottom:1px solid #222;
}

header h1 {
  letter-spacing:4px;
}

/* FILTER NAV */
.nav {
  display:flex;
  justify-content:center;
  gap:20px;
  padding:20px;
  border-bottom:1px solid #222;
}

.nav button {
  background:none;
  border:none;
  color:#888;
  cursor:pointer;
  font-size:12px;
}

.nav button.active {
  color:#fff;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
  padding:40px;
}

.card {
  background:#111;
  border:1px solid #222;
  cursor:pointer;
  transition:0.3s;
  position:relative;
}

.card:hover {
  transform:scale(1.03);
}

.card img {
  width:100%;
  height:300px;
  object-fit:cover;
  filter:grayscale(100%);
}

.card-content {
  padding:20px;
  font-size:13px;
}

.price {
  color:#888;
  font-size:12px;
}

/* BADGES */
.badge {
  position:absolute;
  top:10px;
  left:10px;
  font-size:10px;
  padding:5px 8px;
  border:1px solid #fff;
}

.sold { border-color:red; color:red; }
.new { border-color:white; }
.next { border-color:#555; color:#777; }

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  overflow:auto;
}

.modal img {
  width:100%;
  margin-bottom:20px;
}

.close {
  position:fixed;
  top:20px;
  right:20px;
  cursor:pointer;
}

/* BUTTON */
.buy-btn {
  display:block;
  margin:20px;
  padding:15px;
  border:1px solid #fff;
  text-align:center;
  cursor:pointer;
}

/* DM BOX */
.dm-box {
  margin:20px;
  padding:10px;
  border:1px solid #333;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<header>
<h1>VAMP SELECTION</h1>
<p>
DM → <a href="https://www.instagram.com/daggerdick_77/" target="_blank" style="color:#aaa;">@daggerdick_77</a>
</p>
</header>

<!-- FILTER -->
<div class="nav">
  <button onclick="filter('all')" class="active">ALL</button>
  <button onclick="filter('new')">NEW DROP</button>
  <button onclick="filter('sold')">SOLD OUT</button>
  <button onclick="filter('next')">NEXT DROP</button>
</div>

<!-- PRODUCTS -->
<section class="container">

<div class="card new" data-type="new" onclick="openModal('rick')">
  <div class="badge new">NEW</div>
  <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk.png">
  <div class="card-content">
    RICK OWENS GEOBASKET
    <div class="price">¥120,000</div>
  </div>
</div>

<div class="card sold" data-type="sold">
  <div class="badge sold">SOLD OUT</div>
  <img src="https://balenciaga.dam.kering.com/m/2d3e9f1f6e0f7a0f/Medium-677390W2F701000_F.jpg">
  <div class="card-content">
    BALENCIAGA FURRY MULE
    <div class="price">¥95,000</div>
  </div>
</div>

<div class="card next" data-type="next">
  <div class="badge next">NEXT DROP</div>
  <img src="https://images.stockx.com/images/Rick-Owens-Ramones.png">
  <div class="card-content">
    RICK OWENS RAMONES
    <div class="price">COMING SOON</div>
  </div>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <span class="close" onclick="closeModal()">✕</span>
  <div id="modalContent"></div>

  <div id="dmPreview" class="dm-box"></div>

  <div class="buy-btn" onclick="buyNow()">SEND DM</div>
</div>

<script>
let currentProduct = "";

/* FILTER */
function filter(type) {
  let cards = document.querySelectorAll(".card");
  let buttons = document.querySelectorAll(".nav button");

  buttons.forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");

  cards.forEach(card => {
    if(type === "all" || card.dataset.type === type) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}

/* MODAL */
function openModal(product) {
  const modal = document.getElementById("modal");
  const content = document.getElementById("modalContent");
  const preview = document.getElementById("dmPreview");

  if(product === 'rick') {
    currentProduct = "RICK OWENS GEOBASKET";
    content.innerHTML = `
      <img src="https://images.stockx.com/images/Rick-Owens-Geobasket-Black-Milk.png">
    `;
  }

  preview.innerText = "Message:\nI want to buy: " + currentProduct;

  modal.style.display = "block";
}

/* BUY */
function buyNow() {
  const msg = "I want to buy: " + currentProduct;

  navigator.clipboard.writeText(msg).then(() => {
    window.open("https://www.instagram.com/daggerdick_77/", "_blank");
  });
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
