<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vamp Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&display=swap" rel="stylesheet">

<style>

/* 🌲 BACKGROUND */
body {
  margin:0;
  font-family:'Unbounded', sans-serif;
  color:#eee;
  background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center/cover fixed;
}

/* DARK OVERLAY */
body::before {
  content:'';
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  top:0;
  left:0;
  z-index:-1;
}

/* 🖱️ CURSOR */
.cursor {
  position:fixed;
  width:14px;
  height:14px;
  border-radius:50%;
  background:#fff;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  box-shadow:0 0 12px rgba(255,255,255,0.6);
}

/* 🩸 LOADER */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.blood {
  color:#8b0000;
  font-size:22px;
  letter-spacing:6px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0%,100%{opacity:0.5;}
  50%{opacity:1;}
}

#loader.hide {
  opacity:0;
  transition:1s;
  pointer-events:none;
}

/* HEADER */
header {
  text-align:center;
  padding:25px;
  border-bottom:1px solid #222;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px 20px;
  padding:40px 20px;
}

/* CARD */
.card { cursor:pointer; }

.card img {
  width:100%;
  height:240px;
  object-fit:cover;
}

.name { font-size:13px; margin-top:10px; }
.price { font-size:12px; color:#777; }
.stock { color:red; font-size:11px; }

/* MODAL */
#modal {
  position:fixed;
  bottom:-100%;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.96);
  transition:0.6s;
  z-index:2000;
  padding-top:60px;
  pointer-events:none;
}

#modal.active {
  bottom:0;
  pointer-events:auto;
}

/* ❌ CLOSE */
.close {
  position:fixed;
  top:60px;
  right:20px;
  font-size:24px;
  background:rgba(0,0,0,0.6);
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  z-index:3000;
}

/* GALLERY */
.gallery { overflow:hidden; position:relative; }

.gallery-track {
  display:flex;
  transition:0.6s;
}

.gallery img {
  width:100%;
  flex:0 0 100%;
  opacity:0.6;
  filter:blur(6px);
  transition:0.6s;
}

.gallery img.active {
  opacity:1;
  filter:blur(0);
}

/* ARROWS */
.arrow {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  padding:8px;
  cursor:pointer;
}

.arrow.left { left:10px; }
.arrow.right { right:10px; }

/* DOTS */
.dots { text-align:center; }

.dot {
  width:6px;
  height:6px;
  background:#555;
  display:inline-block;
  margin:5px;
  border-radius:50%;
}

.dot.active {
  width:16px;
  background:#fff;
}

/* DM */
#dmPreview {
  margin:20px;
  font-size:12px;
  color:#aaa;
}

.buy-btn {
  margin:20px;
  padding:15px;
  border:1px solid #fff;
  text-align:center;
  cursor:pointer;
}

/* INSTAGRAM */
.insta {
  text-align:center;
  margin:60px 0;
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div id="loader">
  <h1 class="blood">VAMP SELECTION</h1>
</div>

<header>
  <h1>VAMP SELECTION</h1>
</header>

<section class="container">

<div class="card" onclick="openModal('rick')">
  <img src="IMG_0653.webp">
  <div class="name">Rick Owens<br>Geobasket</div>
  <div class="price">¥120,000</div>
  <div class="stock">Only 1 left</div>
</div>

<div class="card" onclick="openModal('balenciaga')">
  <img src="IMG_0663.jpeg">
  <div class="name">Balenciaga<br>Furry Mule</div>
  <div class="price">¥95,000</div>
</div>

</section>

<div class="insta">
  FOLLOW FOR MORE<br>
  <a href="https://www.instagram.com/daggerdick_77/" target="_blank">Instagram</a>
</div>

<div id="modal">
  <div class="close" onclick="closeModal()">❌</div>
  <div id="modalContent"></div>
  <div id="dmPreview"></div>
  <div class="buy-btn" onclick="buyNow()">DM US ON INSTAGRAM</div>
</div>

<script>

/* LOADER */
window.onload=()=>{
  setTimeout(()=>loader.classList.add("hide"),1200);
};

/* CURSOR */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",(e)=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

/* PARALLAX */
window.addEventListener("scroll",()=>{
  document.body.style.backgroundPositionY=window.scrollY*0.3+"px";
});

let currentProduct="";
let currentIndex=0;
let totalImages=0;

/* OPEN */
function openModal(product){

  if(product==="rick"){
    currentProduct="Rick Owens Geobasket";
    totalImages=2;
    modalContent.innerHTML=createGallery([
      "IMG_0653.webp",
      "IMG_0537.jpeg"
    ]);
  }

  if(product==="balenciaga"){
    currentProduct="Balenciaga Furry Mule";
    totalImages=2;
    modalContent.innerHTML=createGallery([
      "IMG_0663.jpeg",
      "IMG_0506.jpeg"
    ]);
  }

  currentIndex=0;
  setTimeout(updateGallery,50);

  dmPreview.innerText="I want to buy: "+currentProduct;

  modal.classList.add("active");
}

/* GALLERY */
function createGallery(images){
  return `
    <div class="gallery">
      <div class="gallery-track" id="track">
        ${images.map(img=>`<img src="${img}">`).join("")}
      </div>
      <div class="arrow left" onclick="prev()">←</div>
      <div class="arrow right" onclick="next()">→</div>
    </div>
    <div class="dots">
      ${images.map((_,i)=>`<span class="dot" id="dot${i}"></span>`).join("")}
    </div>
  `;
}

/* UPDATE */
function updateGallery(){
  const track=document.getElementById("track");
  const images=document.querySelectorAll("#track img");

  track.style.transform="translateX(-"+(currentIndex*100)+"%)";

  images.forEach((img,i)=>{
    img.classList.toggle("active",i===currentIndex);
  });

  for(let i=0;i<totalImages;i++){
    document.getElementById("dot"+i).classList.remove("active");
  }
  document.getElementById("dot"+currentIndex).classList.add("active");
}

/* NAV */
function next(){
  if(currentIndex<totalImages-1){
    currentIndex++;
    updateGallery();
  }
}

function prev(){
  if(currentIndex>0){
    currentIndex--;
    updateGallery();
  }
}

/* CLOSE */
function closeModal(){
  modal.classList.remove("active");
}

/* BUY */
function buyNow(){
  navigator.clipboard.writeText("I want to buy: "+currentProduct);
  window.open("https://www.instagram.com/daggerdick_77/");
}

</script>

</body>
</html>
