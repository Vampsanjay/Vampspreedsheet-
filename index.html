<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vamp Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* =========================
   🌲 GLOBAL / BACKGROUND
========================= */

body {
  margin:0;
  padding:0;
  font-family:'Unbounded', sans-serif;
  color:#eaeaea;

  background:
  linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
  url('https://images.unsplash.com/photo-1470770903676-69b98201ea1c?grayscale')
  no-repeat center center fixed;

  background-size:cover;
}

/* subtle grain */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://grainy-gradients.vercel.app/noise.svg');
  opacity:0.08;
  pointer-events:none;
}

/* =========================
   🩸 LOADER
========================= */

#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  flex-direction:column;
}

.blood{
  color:#8b0000;
  font-size:24px;
  letter-spacing:8px;
  animation:pulse 1.6s infinite;
}

@keyframes pulse{
  0%,100%{opacity:0.4;}
  50%{opacity:1;}
}

#loader.hide{
  opacity:0;
  transition:1.2s ease;
  pointer-events:none;
}

/* =========================
   🧠 HEADER
========================= */

header{
  text-align:center;
  padding:30px 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(4px);
}

header h1{
  font-size:18px;
  letter-spacing:6px;
  font-weight:500;
}

/* =========================
   🧱 GRID
========================= */

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px 25px;
  padding:50px 20px;
}

/* =========================
   🪦 PRODUCT CARD
========================= */

.card{
  cursor:pointer;
  transition:0.4s ease;
}

.card:hover{
  transform:translateY(-4px);
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
  filter:contrast(1.05);
}

.name{
  margin-top:14px;
  font-size:13px;
  letter-spacing:1px;
}

.price{
  font-size:12px;
  color:#777;
}

.stock{
  font-size:11px;
  color:#b30000;
}

/* =========================
   🩸 MODAL
========================= */

#modal{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.97);
  backdrop-filter:blur(12px);
  transition:0.6s cubic-bezier(0.22,1,0.36,1);
  z-index:2000;
  padding-top:70px;
  pointer-events:none;
}

#modal.active{
  bottom:0;
  pointer-events:auto;
}

/* =========================
   ❌ CLOSE BUTTON
========================= */

.close{
  position:fixed;
  top:70px;
  right:20px;
  font-size:24px;
  padding:10px 14px;
  background:rgba(0,0,0,0.6);
  border-radius:10px;
  backdrop-filter:blur(6px);
  cursor:pointer;
  z-index:3000;
}

/* =========================
   🖼️ GALLERY
========================= */

.gallery{
  position:relative;
  overflow:hidden;
}

.gallery-track{
  display:flex;
  transition:transform 0.6s cubic-bezier(0.22,1,0.36,1);
}

.gallery img{
  width:100%;
  flex:0 0 100%;
  opacity:0.6;
  filter:blur(6px);
  transform:scale(1.06);
  transition:all 0.8s ease;
}

.gallery img.active{
  opacity:1;
  filter:blur(0);
  transform:scale(1);
}

/* =========================
   ⬅️➡️ ARROWS
========================= */

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:20px;
  background:rgba(0,0,0,0.5);
  padding:10px 14px;
  cursor:pointer;
  z-index:10;
}

.arrow.left{ left:10px; }
.arrow.right{ right:10px; }

/* =========================
   ⚪ DOTS
========================= */

.dots{
  text-align:center;
  margin-top:12px;
}

.dot{
  display:inline-block;
  width:6px;
  height:6px;
  margin:6px;
  background:#444;
  border-radius:50%;
  transition:all 0.4s;
}

.dot.active{
  width:18px;
  background:#fff;
  border-radius:10px;
}

/* =========================
   📩 DM SECTION
========================= */

#dmPreview{
  margin:25px;
  font-size:12px;
  color:#aaa;
  line-height:1.6;
}

.buy-btn{
  margin:20px;
  padding:16px;
  border:1px solid #fff;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.buy-btn:hover{
  background:#fff;
  color:#000;
}

/* =========================
   📱 INSTAGRAM
========================= */

.insta{
  margin:80px 0;
  text-align:center;
  font-size:12px;
  color:#777;
}

.insta a{
  display:inline-block;
  margin-top:12px;
  padding:12px 24px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
}

.insta a:hover{
  background:#fff;
  color:#000;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="blood">VAMP SELECTION</div>
</div>

<header>
  <h1>VAMP SELECTION</h1>
</header>

<section class="container">

<div class="card" onclick="openModal('rick')">
  <img src="IMG_0653.webp">
  <div class="name">Rick Owens<br>Geobasket Black Milk</div>
  <div class="price">¥120,000</div>
  <div class="stock">Only 1 left</div>
</div>

<div class="card" onclick="openModal('balenciaga')">
  <img src="IMG_0663.jpeg">
  <div class="name">Balenciaga<br>Furry Mule</div>
  <div class="price">¥95,000</div>
</div>

</section>

<div class="insta">
  ARCHIVE ENERGY — FOLLOW FOR MORE<br>
  <a href="https://www.instagram.com/daggerdick_77/" target="_blank">
    Instagram ↗
  </a>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="close" onclick="closeModal()">❌</div>
  <div id="modalContent"></div>
  <div id="dmPreview"></div>
  <div class="buy-btn" onclick="buyNow()">DM US ON INSTAGRAM</div>
</div>

<script>

/* LOADER */
window.onload = () => {
  setTimeout(()=>{
    document.getElementById("loader").classList.add("hide");
  },1200);
};

let currentProduct="";
let currentIndex=0;
let totalImages=0;

/* OPEN */
function openModal(product){

  if(product==="rick"){
    currentProduct="Rick Owens Geobasket Black Milk";
    totalImages=2;
    modalContent.innerHTML=createGallery([
      "IMG_0653.webp",
      "IMG_0537.jpeg"
    ]);
  }

  if(product==="balenciaga"){
    currentProduct="Balenciaga Furry Mule";
    totalImages=2;
    modalContent.innerHTML=createGallery([
      "IMG_0663.jpeg",
      "IMG_0506.jpeg"
    ]);
  }

  currentIndex=0;
  setTimeout(updateGallery,50);

  dmPreview.innerText="Message:\nI want to buy: "+currentProduct;

  document.getElementById("modal").classList.add("active");
}

/* GALLERY */
function createGallery(images){
  return `
    <div class="gallery">
      <div class="gallery-track" id="track">
        ${images.map(img=>`<img src="${img}">`).join("")}
      </div>

      <div class="arrow left" onclick="prev()">←</div>
      <div class="arrow right" onclick="next()">→</div>
    </div>

    <div class="dots">
      ${images.map((_,i)=>`<span class="dot" id="dot${i}"></span>`).join("")}
    </div>
  `;
}

/* UPDATE */
function updateGallery(){
  const track=document.getElementById("track");
  const images=document.querySelectorAll("#track img");

  track.style.transform="translateX(-"+(currentIndex*100)+"%)";

  images.forEach((img,i)=>{
    img.classList.toggle("active",i===currentIndex);
  });

  for(let i=0;i<totalImages;i++){
    document.getElementById("dot"+i).classList.remove("active");
  }
  document.getElementById("dot"+currentIndex).classList.add("active");
}

/* NAV */
function next(){
  if(currentIndex<totalImages-1){
    currentIndex++;
    updateGallery();
  }
}

function prev(){
  if(currentIndex>0){
    currentIndex--;
    updateGallery();
  }
}

/* CLOSE */
function closeModal(){
  const modal=document.getElementById("modal");
  modal.classList.remove("active");

  setTimeout(()=>{
    modalContent.innerHTML="";
    dmPreview.innerText="";
  },300);
}

/* BUY */
function buyNow(){
  const text="I want to buy: "+currentProduct;
  navigator.clipboard.writeText(text);
  window.open("https://www.instagram.com/daggerdick_77/");
}

</script>

</body>
</html>
